  <tr>
    <td style="padding: 30px; text-align: center; font-size: 12px; color: #666666;">
      <p style="margin: 0 0 10px;" data-slot="company_name">&copy; 2024 Company Name. All rights reserved.</p>
      <p style="margin: 0 0 10px;" data-slot="company_address">123 Street, City, Country</p>
      <p style="margin: 0;">
        <a href="https://example.com/unsubscribe" data-slot="unsub_url" style="color: #666666; text-decoration: underline;">Unsubscribe</a>
        &nbsp;|&nbsp;
        <a href="https://example.com/preferences" data-slot="prefs_url" style="color: #666666; text-decoration: underline;">Preferences</a>
      </p>
    </td>
  </tr>
</table>
