<!-- Email Footer Component -->
<table role="presentation" cellpadding="0" cellspacing="0" width="100%" style="background-color: #f5f5f5;">
  <tr>
    <td style="padding: 30px; text-align: center; font-size: 12px; color: #666666;">
      <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0">
        <tr>
          <td data-slot="company_name" style="padding: 0 0 10px 0; text-align: center; font-family: Arial, sans-serif; font-size: 12px; color: #666666; line-height: 1.5; mso-line-height-rule: exactly;">&copy; 2024 Company Name. All rights reserved.</td>
        </tr>
        <tr>
          <td data-slot="company_address" style="padding: 0 0 10px 0; text-align: center; font-family: Arial, sans-serif; font-size: 12px; color: #666666; line-height: 1.5; mso-line-height-rule: exactly;">123 Street, City, Country</td>
        </tr>
        <tr>
          <td style="padding: 0; text-align: center; font-family: Arial, sans-serif; font-size: 12px; color: #666666; line-height: 1.5; mso-line-height-rule: exactly;">
            <a href="https://example.com/unsubscribe" data-slot="unsub_url" style="color: #666666; text-decoration: underline;">Unsubscribe</a>
            &nbsp;|&nbsp;
            <a href="https://example.com/preferences" data-slot="prefs_url" style="color: #666666; text-decoration: underline;">Preferences</a>
          </td>
        </tr>
      </table>
    </td>
  </tr>
</table>
