<!-- Hero Block Component -->
<table role="presentation" cellpadding="0" cellspacing="0" width="100%">
  <tr>
    <td>
      <img src="{{ image }}" alt="{{ title }}" width="600" height="300" style="display: block; width: 100%; height: auto; border: 0;">
    </td>
  </tr>
  <tr>
    <td style="padding: 30px; text-align: center;">
      <h1 style="margin: 0 0 10px; font-size: 28px; font-weight: bold; color: #0c2340; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;">
        {{ title }}
      </h1>
      <p style="margin: 0; font-size: 18px; color: #555555; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;">
        {{ subtitle }}
      </p>
    </td>
  </tr>
</table>
