<!-- Hero Block — Full-width image with desktop/mobile swap, text overlay, and CTA -->
<table cellpadding="0" cellspacing="0" border="0" width="600" class="resptab" role="presentation" style="width: 600px;" bgcolor="#ffffff">
  <!-- Hero image (desktop) -->
  <tr>
    <td align="center">
      <a href="{{ link_url }}" style="color: #1a1a1a; text-decoration: none;" target="_blank">
        <img src="{{ desktop_image }}" alt="{{ image_alt }}" style="display: block; border: 0;" border="0" class="hide" width="600" height="350">
      </a>
      <!--[if !mso]><!-->
      <div class="show" style="font-size: 0%; max-height: 0; width: 0; overflow: hidden; display: none;">
        <a href="{{ link_url }}" style="color: #1a1a1a; text-decoration: none;" target="_blank">
          <img src="{{ mobile_image }}" alt="{{ image_alt }}" style="display: block; border: 0;" border="0" class="respimg" width="640" height="400">
        </a>
      </div>
      <!--<![endif]-->
    </td>
  </tr>
  <!-- Text content -->
  <tr>
    <td align="center" class="padlr20 padbot40" style="padding: 30px;">
      <table cellpadding="0" cellspacing="0" border="0" width="520" class="resptab" role="presentation" style="width: 520px;">
        <!-- Subtitle -->
        <tr>
          <td class="hero-subtitle" style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 14px; line-height: 21px; color: #666666; mso-line-height-rule: exactly; text-align: left; padding-bottom: 15px;">
            {{ subtitle }}
          </td>
        </tr>
        <!-- Heading -->
        <tr>
          <td class="hero-title" style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 28px; line-height: 34px; color: #1a1a1a; mso-line-height-rule: exactly; text-align: left; padding-bottom: 15px; font-weight: bold;">
            {{ title }}
          </td>
        </tr>
        <!-- Body text -->
        <tr>
          <td class="hero-subtitle" style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 16px; line-height: 24px; color: #666666; mso-line-height-rule: exactly; text-align: left;">
            {{ body_text }}
          </td>
        </tr>
        <!-- CTA button -->
        <tr>
          <td align="left" style="padding-top: 25px;">
            <table cellpadding="0" cellspacing="0" border="0" class="cta resptab" role="presentation" style="border-radius: 25px; border: 2px solid {{ button_color }};" bgcolor="{{ button_color }}">
              <tr>
                <td align="center" style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 14px; line-height: 14px; color: #ffffff; mso-line-height-rule: exactly; text-decoration: none; font-weight: bold; padding: 14px 30px;">
                  <a href="{{ button_url }}" target="_blank" style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 14px; line-height: 14px; color: #ffffff; text-decoration: none; font-weight: bold;">{{ button_text }}</a>
                </td>
              </tr>
            </table>
          </td>
        </tr>
      </table>
    </td>
  </tr>
</table>
