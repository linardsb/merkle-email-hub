<!-- Component: product-card -->
<!--[if mso]>
<table role="presentation" width="600" align="center" cellpadding="0" cellspacing="0" border="0"><tr><td>
<![endif]-->
<table role="presentation" class="product-card" width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color: #ffffff; border: 1px solid #e0e0e0; border-radius: 8px; overflow: hidden;">
  <tr>
    <td>
      <img data-slot="image_url" src="https://via.placeholder.com/600x300" alt="Product Image" width="600" height="300" style="display: block; width: 100%; height: auto; border: 0;" />
    </td>
  </tr>
  <tr>
    <td data-slot="title" class="product-title" role="heading" aria-level="3" style="padding: 20px 24px 8px 24px; font-family: Arial, sans-serif; font-size: 20px; font-weight: bold; color: #333333; mso-line-height-rule: exactly;">Product Name</td>
  </tr>
  <tr>
    <td data-slot="price" class="product-price" style="padding: 0 24px 12px 24px; font-family: Arial, sans-serif; font-size: 18px; font-weight: bold; color: #0066cc; mso-line-height-rule: exactly;">&pound;49.99</td>
  </tr>
  <tr>
    <td data-slot="description" class="product-desc" style="padding: 0 24px 20px 24px; font-family: Arial, sans-serif; font-size: 14px; color: #666666; line-height: 1.5; mso-line-height-rule: exactly;">A short description of this product highlighting its key features and benefits.</td>
  </tr>
  <tr>
    <td style="padding: 0 24px 20px 24px;">
      <a data-slot="cta_url" href="https://example.com/product" style="display: inline-block; padding: 10px 24px; background-color: #0066cc; color: #ffffff; text-decoration: none; font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; border-radius: 4px;"><span data-slot="cta_text">View Product</span></a>
    </td>
  </tr>
</table>
<!--[if mso]>
</td></tr></table>
<![endif]-->
