<!-- Product Card Component -->
<table role="presentation" cellpadding="0" cellspacing="0" width="100%" style="margin: 20px 0;">
  <tr>
    <td style="padding: 0 30px;">
      <table role="presentation" cellpadding="0" cellspacing="0" width="100%" style="border: 1px solid #e0e0e0; border-radius: 8px; overflow: hidden;">
        <tr>
          <td>
            <img src="{{ image }}" alt="{{ name }}" width="280" height="180" style="display: block; width: 100%; height: auto; border: 0;">
          </td>
        </tr>
        <tr>
          <td style="padding: 20px;">
            <h3 style="margin: 0 0 8px; font-size: 18px; font-weight: bold; color: #0c2340; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;">
              {{ name }}
            </h3>
            <p style="margin: 0; font-size: 14px; color: #666666; line-height: 1.5; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;">
              {{ description }}
            </p>
          </td>
        </tr>
      </table>
    </td>
  </tr>
</table>
