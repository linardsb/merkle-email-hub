<!-- Component: anim-fade -->
<!-- Usage: Type 'anim-fade' + Tab in Sublime Text -->

.fade {
  -webkit-animation: fadeIn 5s linear infinite;
  -moz-animation: fadeIn 5s linear infinite;
  -o-animation: fadeIn 5s linear infinite;
  }
  @-webkit-keyframes fadeIn {
  0% {opacity: 0;}
  50% {opacity: 1;}
  100% {opacity: 0;}
  }
