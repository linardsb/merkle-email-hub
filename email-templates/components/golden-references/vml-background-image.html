<!-- golden-ref: criteria=[mso_conditional_correctness, vml_wellformedness], agents=[scaffolder, outlook_fixer], verified=2026-03-29 -->
<!-- VML Background Image — v:rect with v:fill type="frame", MSO conditional, CSS background-image fallback -->
<!DOCTYPE html>
<html lang="en" xmlns:v="urn:schemas-microsoft-com:vml" xmlns:o="urn:schemas-microsoft-com:office:office">
<head>
<meta charset="utf-8">
<meta name="x-apple-disable-message-reformatting">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="format-detection" content="telephone=no, date=no, address=no, email=no, url=no">
<meta name="color-scheme" content="light dark">
<meta name="supported-color-schemes" content="light dark">
<!--[if mso]>
<noscript>
<xml>
  <o:OfficeDocumentSettings>
    <o:PixelsPerInch>96</o:PixelsPerInch>
  </o:OfficeDocumentSettings>
</xml>
</noscript>
<![endif]-->
<title>VML Background Image</title>
<style>
  @media (prefers-color-scheme: dark) {
    .dark-bg { background-color: #1a1a2e !important; }
    .dark-text { color: #e0e0e0 !important; }
  }
  [data-ogsc] .dark-text { color: #e0e0e0 !important; }
  [data-ogsb] .dark-bg { background-color: #1a1a2e !important; }
</style>
</head>
<body style="margin: 0; padding: 0; background-color: #f4f4f4;">
<table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="border-collapse: collapse; mso-table-lspace: 0pt; mso-table-rspace: 0pt;">
<tr>
  <td align="center" style="padding: 20px 0;">
    <!-- 600px container -->
    <!--[if mso]>
    <table role="presentation" width="600" align="center" cellpadding="0" cellspacing="0" border="0" style="border-collapse: collapse; mso-table-lspace: 0pt; mso-table-rspace: 0pt;"><tr><td>
    <![endif]-->
    <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="600" style="width: 600px; max-width: 600px; border-collapse: collapse; mso-table-lspace: 0pt; mso-table-rspace: 0pt;">
      <tr>
        <td style="background-repeat: no-repeat; background-position: center center; background-size: cover; background-image: url(https://via.placeholder.com/600x400/1a1a2e/ffffff); overflow: hidden !important;" valign="middle" bgcolor="#1a1a2e" background="https://via.placeholder.com/600x400/1a1a2e/ffffff">
          <!--[if gte mso 9]>
          <v:rect xmlns:v="urn:schemas-microsoft-com:vml" fill="true" stroke="false" style="width:600px;">
            <v:fill type="frame" src="https://via.placeholder.com/600x400/1a1a2e/ffffff" color="#1a1a2e" />
            <v:textbox style="mso-fit-shape-to-text:true;" inset="0,0,0,0">
          <![endif]-->
          <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="border-collapse: collapse; mso-table-lspace: 0pt; mso-table-rspace: 0pt;">
            <tr>
              <td style="padding: 60px 40px; text-align: center;">
                <h1 data-slot="heading" style="margin: 0 0 10px 0; font-family: Arial, sans-serif; font-size: 32px; line-height: 120%; color: #ffffff; mso-line-height-rule: exactly; text-transform: uppercase; font-weight: bold;">Hero Headline</h1>
                <p data-slot="body_text" style="margin: 0 0 10px 0; font-family: Arial, sans-serif; font-size: 16px; line-height: 150%; color: #ffffff; mso-line-height-rule: exactly;">Supporting text that sits on top of the VML background image. Visible in all email clients with proper fallback.</p>
                <!-- Spacer -->
                <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="border-collapse: collapse; mso-table-lspace: 0pt; mso-table-rspace: 0pt;">
                  <tr>
                    <td style="height: 20px; font-size: 1px; line-height: 1px; mso-line-height-rule: exactly;"><!--[if gte mso 9]>&nbsp;<![endif]--></td>
                  </tr>
                </table>
                <!-- CTA Button -->
                <table role="presentation" cellpadding="0" cellspacing="0" border="0" align="center" style="border-collapse: collapse; mso-table-lspace: 0pt; mso-table-rspace: 0pt;">
                  <tr>
                    <td align="center" bgcolor="#ffffff" style="border-radius: 4px; mso-padding-alt: 12px 28px;">
                      <a data-slot="cta_url" href="https://example.com" target="_blank" style="display: inline-block; padding: 12px 28px; font-family: Arial, sans-serif; font-size: 16px; line-height: 120%; color: #1a1a2e; text-decoration: none; font-weight: bold; mso-line-height-rule: exactly;">Shop Now</a>
                    </td>
                  </tr>
                </table>
              </td>
            </tr>
          </table>
          <!--[if gte mso 9]>
            </v:textbox>
          </v:rect>
          <![endif]-->
        </td>
      </tr>
    </table>
    <!--[if mso]>
    </td></tr></table>
    <![endif]-->
  </td>
</tr>
</table>
</body>
</html>
