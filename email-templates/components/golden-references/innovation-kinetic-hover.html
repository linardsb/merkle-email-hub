<title>Kinetic Hover Effects</title>
<style>
  /* === Kinetic CSS: hover effects for supporting clients === */

  /* Product card hover: reveal secondary CTA */
  .product-card .hover-reveal {
    max-height: 0;
    overflow: hidden;
    opacity: 0;
    -webkit-transition: max-height 0.3s ease, opacity 0.3s ease;
    transition: max-height 0.3s ease, opacity 0.3s ease;
  }
  .product-card:hover .hover-reveal {
    max-height: 60px;
    opacity: 1;
  }

  /* Button hover: background color transition */
  .btn-kinetic {
    -webkit-transition: background-color 0.3s ease;
    transition: background-color 0.3s ease;
  }
  .btn-kinetic:hover {
    background-color: #004499 !important;
  }

  /* Animated underline on links */
  .link-animated {
    text-decoration: none;
    border-bottom: 2px solid transparent;
    -webkit-transition: border-color 0.3s ease;
    transition: border-color 0.3s ease;
  }
  .link-animated:hover {
    border-bottom-color: #0066cc;
  }

  /* Subtle pulse animation on primary CTA */
  @-webkit-keyframes pulse {
    0% { -webkit-transform: scale(1); }
    50% { -webkit-transform: scale(1.03); }
    100% { -webkit-transform: scale(1); }
  }
  @keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.03); }
    100% { transform: scale(1); }
  }
  .pulse-hover:hover {
    -webkit-animation: pulse 1s ease-in-out infinite;
    animation: pulse 1s ease-in-out infinite;
  }

  /* Image zoom on hover */
  .img-zoom {
    -webkit-transition: -webkit-transform 0.4s ease;
    transition: transform 0.4s ease;
    overflow: hidden;
  }
  .img-zoom:hover img {
    -webkit-transform: scale(1.05);
    transform: scale(1.05);
  }

  /* Mobile touch fallback: always show hover-reveal content */
  @media screen and (max-width: 620px) {
    .column { display: block !important; max-width: 100% !important; width: 100% !important; }
    .product-card .hover-reveal {
      max-height: 60px !important;
      opacity: 1 !important;
    }
  }

  @media (prefers-color-scheme: dark) {
    .dark-bg { background-color: #1e1e1e !important; }
    .dark-text { color: #e0e0e0 !important; }
    .dark-card { background-color: #2d2d44 !important; }
  }
  [data-ogsc] .dark-text { color: #e0e0e0 !important; }
  [data-ogsb] .dark-bg { background-color: #1e1e1e !important; }
  [data-ogsb] .dark-card { background-color: #2d2d44 !important; }
</style>
