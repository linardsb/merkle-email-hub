# Golden Reference Registry — maps templates to judge criteria and agents.
# Used by app/ai/agents/evals/golden_references.py to serve snippets to judges.
#
# selector.lines: [start, end] inclusive 1-based line range for snippet extraction.
# Omit selector to use full file (capped at 80 lines).

