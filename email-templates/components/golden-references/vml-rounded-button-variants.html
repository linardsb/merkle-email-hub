<!-- golden-ref: criteria=[vml_wellformedness, email_layout_patterns], agents=[outlook_fixer, scaffolder], verified=2026-03-29 -->
<!-- VML Rounded Button Variants — v:roundrect bulletproof buttons with arcsize, fillcolor, strokecolor -->
<!DOCTYPE html>
<html lang="en" xmlns:v="urn:schemas-microsoft-com:vml" xmlns:o="urn:schemas-microsoft-com:office:office">
<head>
<meta charset="utf-8">
<meta name="x-apple-disable-message-reformatting">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="format-detection" content="telephone=no, date=no, address=no, email=no, url=no">
<meta name="color-scheme" content="light dark">
<meta name="supported-color-schemes" content="light dark">
<!--[if mso]>
<noscript>
<xml>
  <o:OfficeDocumentSettings>
    <o:PixelsPerInch>96</o:PixelsPerInch>
  </o:OfficeDocumentSettings>
</xml>
</noscript>
<![endif]-->
<title>VML Rounded Button Variants</title>
<style>
  @media (prefers-color-scheme: dark) {
    .dark-bg { background-color: #1a1a2e !important; }
    .dark-text { color: #e0e0e0 !important; }
  }
  [data-ogsc] .dark-text { color: #e0e0e0 !important; }
  [data-ogsb] .dark-bg { background-color: #1a1a2e !important; }
</style>
</head>
<body style="margin: 0; padding: 0; background-color: #f4f4f4;">
<table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="border-collapse: collapse; mso-table-lspace: 0pt; mso-table-rspace: 0pt;">
<tr>
  <td align="center" style="padding: 20px 0;">
    <!--[if mso]>
    <table role="presentation" width="600" align="center" cellpadding="0" cellspacing="0" border="0" style="border-collapse: collapse; mso-table-lspace: 0pt; mso-table-rspace: 0pt;"><tr><td>
    <![endif]-->
    <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="600" style="width: 600px; max-width: 600px; border-collapse: collapse; mso-table-lspace: 0pt; mso-table-rspace: 0pt;">

      <!-- === Variant 1: Primary Filled Button (large) === -->
      <tr>
        <td align="center" style="padding: 20px 40px;">
          <h2 style="margin: 0 0 10px 0; font-family: Arial, sans-serif; font-size: 14px; color: #666666; text-transform: uppercase; letter-spacing: 1px;">Primary Button</h2>
          <!-- Outlook VML button -->
          <!--[if mso]>
          <v:roundrect xmlns:v="urn:schemas-microsoft-com:vml" xmlns:w="urn:schemas-microsoft-com:office:word" href="https://example.com/primary" style="height:48px; v-text-anchor:middle; width:220px;" arcsize="10%" strokecolor="#0066cc" fillcolor="#0066cc">
            <w:anchorlock/>
            <center style="color:#ffffff; font-family:Arial, sans-serif; font-size:16px; font-weight:bold;">Get Started</center>
          </v:roundrect>
          <![endif]-->
          <!--[if !mso]><!-->
          <table role="presentation" cellpadding="0" cellspacing="0" border="0" align="center" style="border-collapse: collapse; mso-table-lspace: 0pt; mso-table-rspace: 0pt;">
            <tr>
              <td align="center" bgcolor="#0066cc" style="border-radius: 5px; mso-padding-alt: 14px 32px;">
                <a data-slot="primary_cta_url" href="https://example.com/primary" target="_blank" style="display: inline-block; padding: 14px 32px; font-family: Arial, sans-serif; font-size: 16px; line-height: 120%; color: #ffffff; text-decoration: none; font-weight: bold; border-radius: 5px;">Get Started</a>
              </td>
            </tr>
          </table>
          <!--<![endif]-->
        </td>
      </tr>

      <!-- === Variant 2: Secondary Outline Button (medium) === -->
      <tr>
        <td align="center" style="padding: 20px 40px;">
          <h2 style="margin: 0 0 10px 0; font-family: Arial, sans-serif; font-size: 14px; color: #666666; text-transform: uppercase; letter-spacing: 1px;">Secondary Button</h2>
          <!--[if mso]>
          <v:roundrect xmlns:v="urn:schemas-microsoft-com:vml" xmlns:w="urn:schemas-microsoft-com:office:word" href="https://example.com/secondary" style="height:44px; v-text-anchor:middle; width:200px;" arcsize="50%" strokecolor="#0066cc" fillcolor="#ffffff" strokeweight="2px">
            <w:anchorlock/>
            <center style="color:#0066cc; font-family:Arial, sans-serif; font-size:14px; font-weight:bold;">Learn More</center>
          </v:roundrect>
          <![endif]-->
          <!--[if !mso]><!-->
          <table role="presentation" cellpadding="0" cellspacing="0" border="0" align="center" style="border-collapse: collapse; mso-table-lspace: 0pt; mso-table-rspace: 0pt;">
            <tr>
              <td align="center" bgcolor="#ffffff" style="border: 2px solid #0066cc; border-radius: 22px; mso-padding-alt: 12px 28px;">
                <a data-slot="secondary_cta_url" href="https://example.com/secondary" target="_blank" style="display: inline-block; padding: 12px 28px; font-family: Arial, sans-serif; font-size: 14px; line-height: 120%; color: #0066cc; text-decoration: none; font-weight: bold; border-radius: 22px;">Learn More</a>
              </td>
            </tr>
          </table>
          <!--<![endif]-->
        </td>
      </tr>

      <!-- === Variant 3: Compact / Small Button === -->
      <tr>
        <td align="center" style="padding: 20px 40px;">
          <h2 style="margin: 0 0 10px 0; font-family: Arial, sans-serif; font-size: 14px; color: #666666; text-transform: uppercase; letter-spacing: 1px;">Compact Button</h2>
          <!--[if mso]>
          <v:roundrect xmlns:v="urn:schemas-microsoft-com:vml" xmlns:w="urn:schemas-microsoft-com:office:word" href="https://example.com/compact" style="height:36px; v-text-anchor:middle; width:140px;" arcsize="8%" strokecolor="#333333" fillcolor="#333333">
            <w:anchorlock/>
            <center style="color:#ffffff; font-family:Arial, sans-serif; font-size:13px;">View Details</center>
          </v:roundrect>
          <![endif]-->
          <!--[if !mso]><!-->
          <table role="presentation" cellpadding="0" cellspacing="0" border="0" align="center" style="border-collapse: collapse; mso-table-lspace: 0pt; mso-table-rspace: 0pt;">
            <tr>
              <td align="center" bgcolor="#333333" style="border-radius: 3px; mso-padding-alt: 8px 20px;">
                <a data-slot="compact_cta_url" href="https://example.com/compact" target="_blank" style="display: inline-block; padding: 8px 20px; font-family: Arial, sans-serif; font-size: 13px; line-height: 120%; color: #ffffff; text-decoration: none; border-radius: 3px;">View Details</a>
              </td>
            </tr>
          </table>
          <!--<![endif]-->
        </td>
      </tr>

    </table>
    <!--[if mso]>
    </td></tr></table>
    <![endif]-->
  </td>
</tr>
</table>
</body>
</html>
