<!-- Component: vml-bg — VML background image with Outlook fallback -->

<table cellpadding="0" cellspacing="0" border="0" width="{{ outer_width || '600' }}" class="resptab" role="presentation" style="width:{{ outer_width || '600' }}px;">
        	<tr align="center">
        		<td style="background-repeat: no-repeat; background-position: center center; background-size: cover; background-image: url({{ bg_image }}); overflow: hidden !important;" valign="middle" bgcolor="#000000" background="{{ bg_image }}">
        			<!--[if gte mso 9]>
        			<v:rect xmlns:v="urn:schemas-microsoft-com:vml" xmlns:o="urn:schemas-microsoft-com:office:office" style="width: px; height: auto;" stroke="false" fillcolor="#000000">
        				<v:fill xmlns:v="urn:schemas-microsoft-com:vml" type="frame"  size="100%,100%" src="{{ bg_image }}" position="0,0" />
        				<v:textbox style="mso-fit-shape-to-text: true; overflow: hidden;" inset=" 0, 0, 0, 0">
        			<![endif]-->
        			<div>
        				<div style="line-height: 0px; font-size: 0px;">
        					<table cellpadding="0" cellspacing="0" border="0" width="{{ inner_width || '520' }}" class="resptab" role="presentation" style="width:{{ inner_width || '520' }}px;">
        						<tr align="center">
        							<td align="center" class="lrpad">
        								<table cellpadding="0" cellspacing="0" border="0" width="100%" class="resptab" role="presentation" style="width:100%;">
        									<tr align="center">
        										<td style="height: 40px; font-size: 1px; line-height: 1px; mso-line-height-rule: exactly;" height="40">
        											<!--[if gte mso 9]>&nbsp;<![endif]-->
        										</td>
        									</tr>
        									<tr align="center">
        										<td align="center">
        											<table width="100%" border="0" cellspacing="0" class="resptab" role="presentation" cellpadding="0" align="center">
        												<tbody>
        													<tr align="center">
        														<td data-slot="heading" align="center" class="textLeft" style="font-family: Arial, sans-serif; font-size: 16px; line-height: 120%; color:#ffffff; mso-line-height-rule: exactly; text-align: center; text-transform:uppercase; font-weight: bold;">
        															Heading text
        														</td>
        													</tr>
        													<tr align="center">
        														<td style="height: 25px; font-size: 1px; line-height: 1px; mso-line-height-rule: exactly;" height="25">
        															<!--[if gte mso 9]>&nbsp;<![endif]-->
        														</td>
        													</tr>
        													<tr align="center">
        														<td data-slot="subheading" align="center" class="textLeft" style="font-family: Arial, sans-serif; font-size: 30px; line-height: 120%; color:#ffffff; mso-line-height-rule: exactly; text-align: center; text-transform:uppercase; font-weight: bold;">
        															Subheading text
        														</td>
        													</tr>
        													<tr align="center">
        														<td style="height: 20px; font-size: 1px; line-height: 1px; mso-line-height-rule: exactly;" height="20">
        															<!--[if gte mso 9]>&nbsp;<![endif]-->
        														</td>
        													</tr>
        													<tr align="center">
        														<td data-slot="body_text" align="center" class="textLeft" style="font-family: Arial, sans-serif; font-size: 14px; line-height: 150%; color:#ffffff; mso-line-height-rule: exactly; text-align: center;">
        															Body text content
        														</td>
        													</tr>
        													<tr align="center">
        														<td style="height: 25px; font-size: 1px; line-height: 1px; mso-line-height-rule: exactly;" height="25">
        															<!--[if gte mso 9]>&nbsp;<![endif]-->
        														</td>
        													</tr>
        													<tr align="center">
        														<td align="center">
        															<table border="0" cellspacing="0" cellpadding="0" role="presentation" bgcolor="#ffffff" style="border-radius: 2px;">
        																<tr align="center">
        																	<td align="center" style="mso-line-height-rule: exactly; font-size: 16px; line-height: 21px; text-align: center; font-family: Arial, sans-serif; color: #000000;text-decoration: none; display: inline-block; padding-top:12px; padding-bottom: 12px; padding-right:20px;padding-left:20px;">
        																		<a href="{{ button_url }}" target="_blank" style="mso-line-height-rule: exactly; font-size: 16px; line-height: 21px; text-align: center; font-family: Arial, sans-serif; color: #000000;text-decoration: none !important; display: inline-block;" >
        																		<strong>{{ button_text || 'Learn more' }} &rsaquo;</strong></a>
        																	</td>
        																</tr>
        															</table>
        														</td>
        													</tr>
        												</tbody>
        											</table>
        										</td>
        									</tr>
        									<tr align="center">
        										<td style="height: 40px; font-size: 1px; line-height: 1px; mso-line-height-rule: exactly;" height="40">
        											<!--[if gte mso 9]>&nbsp;<![endif]-->
        										</td>
        									</tr>
        								</table>
        							</td>
        						</tr>
        					</table>
        				</div>
        			</div>
        			<!--[if gte mso 9]>
        			</v:textbox>
        			</v:rect>
        			<![endif]-->
        		</td>
        	</tr>
        </table>
