<!-- Component: anim-rotate -->
<style>
.rotate {
  -webkit-animation: spin 20s linear infinite;
  -moz-animation: spin 20s linear infinite;
  -o-animation: spin 20s linear infinite;
  animation: spin 20s linear infinite;
}
@-webkit-keyframes spin {
  100% { -webkit-transform: rotate(360deg); transform: rotate(360deg); }
}
@-moz-keyframes spin {
  100% { -moz-transform: rotate(360deg); transform: rotate(360deg); }
}
@keyframes spin {
  100% { -webkit-transform: rotate(360deg); transform: rotate(360deg); }
}
</style>
<table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0">
  <tr>
    <td align="center" style="padding:0;">
      <a data-slot="link" href="https://example.com" target="_blank" style="text-decoration:none;">
        <img data-slot="image" class="rotate" src="https://fakeimg.pl/600x400/" alt="" style="display:block;max-width:100%;height:auto;" border="0" />
      </a>
    </td>
  </tr>
</table>
