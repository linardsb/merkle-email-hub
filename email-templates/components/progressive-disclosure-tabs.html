<!-- Component: progressive-disclosure-tabs -->
<!-- Compatibility: partial_interactive — CSS radio button hack works in Apple Mail, iOS Mail, some webmail. Fallback: all content visible. -->
<!--[if mso]>
<table role="presentation" width="600" align="center" cellpadding="0" cellspacing="0" border="0" style="border-collapse: collapse; mso-table-lspace: 0pt; mso-table-rspace: 0pt;"><tr><td>
<![endif]-->
<table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0" class="dark-bg" style="background-color: #ffffff; border-collapse: collapse; mso-table-lspace: 0pt; mso-table-rspace: 0pt;">
  <tr>
    <td style="padding: 24px;">
      <style>
        .tab-radio { display: none !important; }
        .tab-label { display: inline-block; padding: 10px 24px; font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; color: #666666; text-decoration: none; border-bottom: 2px solid transparent; cursor: pointer; }
        .tab-content { display: none; }
        /* Tab 1 active by default */
        #tab-radio-1:checked ~ .tab-nav .tab-label-1 { color: #0066cc; border-bottom-color: #0066cc; }
        #tab-radio-1:checked ~ .tab-panel-1 { display: block; }
        /* Tab 2 active */
        #tab-radio-2:checked ~ .tab-nav .tab-label-1 { color: #666666; border-bottom-color: transparent; }
        #tab-radio-2:checked ~ .tab-nav .tab-label-2 { color: #0066cc; border-bottom-color: #0066cc; }
        #tab-radio-2:checked ~ .tab-panel-1 { display: none; }
        #tab-radio-2:checked ~ .tab-panel-2 { display: block; }
      </style>
      <!--[if !mso]><!-->
      <input type="radio" id="tab-radio-1" name="tabs" class="tab-radio" checked="checked" style="display: none;" />
      <input type="radio" id="tab-radio-2" name="tabs" class="tab-radio" style="display: none;" />
      <!--<![endif]-->
      <!-- Tab buttons -->
      <!--[if !mso]><!-->
      <div class="tab-nav" style="text-align: center; border-bottom: 1px solid #e0e0e0;">
        <label for="tab-radio-1" class="tab-label tab-label-1" style="display: inline-block; padding: 10px 24px; font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; color: #0066cc; border-bottom: 2px solid #0066cc; cursor: pointer;">
          <span data-slot="tab_1">Tab One</span>
        </label>
        <label for="tab-radio-2" class="tab-label tab-label-2" style="display: inline-block; padding: 10px 24px; font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; color: #666666; border-bottom: 2px solid transparent; cursor: pointer;">
          <span data-slot="tab_2">Tab Two</span>
        </label>
      </div>
      <!--<![endif]-->
      <!-- Tab 1 content -->
      <!--[if !mso]><!-->
      <div class="tab-content tab-panel-1" style="display: block;">
      <!--<![endif]-->
        <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0">
          <tr>
            <td data-slot="content_1" style="padding: 16px 0 10px; font-family: Arial, sans-serif; font-size: 14px; color: #555555; line-height: 1.6; mso-line-height-rule: exactly;" class="dark-text">
              Content for the first tab. This is visible by default. In email clients that do not support the radio button CSS hack, all tab content will be displayed.
            </td>
          </tr>
        </table>
      <!--[if !mso]><!-->
      </div>
      <!--<![endif]-->
      <!-- Tab 2 content -->
      <!--[if !mso]><!-->
      <div class="tab-content tab-panel-2" style="display: none;">
      <!--<![endif]-->
        <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0">
          <tr>
            <td data-slot="content_2" style="padding: 16px 0 10px; font-family: Arial, sans-serif; font-size: 14px; color: #555555; line-height: 1.6; mso-line-height-rule: exactly;" class="dark-text">
              Content for the second tab. This is hidden by default and revealed when the user clicks the second tab label.
            </td>
          </tr>
        </table>
      <!--[if !mso]><!-->
      </div>
      <!--<![endif]-->
    </td>
  </tr>
</table>
<!--[if mso]>
</td></tr></table>
<![endif]-->
