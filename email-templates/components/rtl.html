<!-- Component: rtl -->
<!-- Usage: Type 'rtl' + Tab in Sublime Text -->

<table width="$1" class="wf" border="0" cellpadding="0" cellspacing="0" align="center" role="presentation" style="width:$1px;">
  <tr>
    <td dir="rtl">
      <table width="$2" class="wf" border="0" cellpadding="0" cellspacing="0" align="right" role="presentation">
        <tr>
          <td dir="ltr">$4</td>
        </tr>
      </table>
      <!--[if mso]></td><td><![endif]-->
      <table width="$3" class="wf" border="0" cellpadding="0" cellspacing="0" align="left" role="presentation">
        <tr>
          <td dir="ltr">

          </td>
        </tr>
      </table>
    </td>
  </tr>
</table>
