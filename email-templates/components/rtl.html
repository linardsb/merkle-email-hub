<!-- Component: rtl -->

<table width="{{ outer_width || '600' }}" class="wf" border="0" cellpadding="0" cellspacing="0" align="center" role="presentation" style="width:{{ outer_width || '600' }}px;">
  <tr>
    <td dir="rtl">
      <table width="{{ right_width || '300' }}" class="wf" border="0" cellpadding="0" cellspacing="0" align="right" role="presentation">
        <tr>
          <td data-slot="right_content" dir="ltr">Right column content</td>
        </tr>
      </table>
      <!--[if mso]></td><td><![endif]-->
      <table width="{{ left_width || '300' }}" class="wf" border="0" cellpadding="0" cellspacing="0" align="left" role="presentation">
        <tr>
          <td data-slot="left_content" dir="ltr">
            Left column content
          </td>
        </tr>
      </table>
    </td>
  </tr>
</table>
