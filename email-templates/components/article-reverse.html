<!-- Component: article-reverse — Reverse-stacked article (text left, image right on desktop) -->

<table cellpadding="0" cellspacing="0" border="0" width="600" id="vwrevart" class="resptab" role="presentation" style="width:600px;" bgcolor="#ffffff">
      <tr align="center">
        <th align="center" class="ldown" valign="top">
          <table cellpadding="0" cellspacing="0" border="0" width="300" class="resptab" role="presentation" style="width:300px;">
            <tr align="center">
              <td align="center" class="padlr20 padtop40 padbot40" style="padding-top:20px;">
                <table cellpadding="0" cellspacing="0" border="0" width="240" class="resptab" role="presentation" style="width:240px;">
                  <tr align="center">
                    <td data-slot="heading" align="center" style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 20px; line-height: 24px; color:#1a1a1a; mso-line-height-rule: exactly; text-align: left; font-weight:normal; padding-bottom:20px;">
                      Article heading
                    </td>
                  </tr>
                  <tr align="center">
                    <td data-slot="body_text" align="center" style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 14px; line-height: 21px; color:#1a1a1a; mso-line-height-rule: exactly; text-align: left;">
                      Article body text goes here. Replace with your content.
                    </td>
                  </tr>
                  <tr align="center">
                    <td align="left" style="padding-top: 30px;">
                      <table cellpadding="0" cellspacing="0" border="0" class="cta" role="presentation" style="border-radius:25px;" bgcolor="#e84e0f">
                        <tr align="center">
                          <td align="center" style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 14px; line-height: 21px; color:#ffffff; mso-line-height-rule: exactly; text-decoration: none; font-weight:bold; padding-left: 30px; padding-right: 30px; height: 50px;">
                            <a data-slot="cta_url" href="https://example.com/link" target="_blank" style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 14px; line-height: 21px; color:#ffffff; mso-line-height-rule: exactly; text-decoration: none; font-weight:bold;"><span data-slot="cta_text">Primary button</span></a>
                          </td>
                        </tr>
                      </table>
                    </td>
                  </tr>
                </table>
              </td>
            </tr>
          </table>
        </th>
        <th align="center" class="rup" valign="top">
          <table cellpadding="0" cellspacing="0" border="0" width="300" class="resptab" role="presentation" style="width:300px;">
            <tr align="center">
              <td align="center">
                <a href="https://example.com/link" style="color: #1a1a1a; text-decoration: none;" target="_blank"><img data-slot="image_url" src="https://fakeimg.pl/600x600/" alt="Article image" style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; display: block; border: 0; font-size: 16px; font-weight: normal; color: #1a1a1a; line-height: 16px; mso-line-height-rule: exactly;" border="0" class="respimg" width="300" height="300"></a>
              </td>
            </tr>
          </table>
        </th>
      </tr>
    </table>
