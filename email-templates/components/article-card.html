<!-- Article Card — Image + heading + body + CTA in hybrid 2-column layout -->
<!--[if mso]>
<table role="presentation" width="600" align="center" cellpadding="0" cellspacing="0" border="0" style="border-collapse: collapse; mso-table-lspace: 0pt; mso-table-rspace: 0pt;"><tr><td>
<![endif]-->
<table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0">
  <tr>
    <td class="_outer" style="padding: 0;">
<table role="presentation" class="artcard-bg _inner" width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color: #ffffff; border-collapse: collapse; mso-table-lspace: 0pt; mso-table-rspace: 0pt;">
  <tr>
    <td style="font-size: 0; text-align: center; mso-line-height-rule: exactly;">
      <!--[if mso]>
      <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0"><tr><td width="280" valign="top">
      <![endif]-->
      <div class="column" style="display: inline-block; max-width: 280px; width: 100%; vertical-align: top;">
        <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0">
          <tr>
            <td style="padding: 0;">
              <img data-slot="image_url" src="https://via.placeholder.com/280x200" data-slot-alt="image_alt" alt="Article image" width="280" style="display: block; width: 100%; height: auto; border: 0;" />
            </td>
          </tr>
        </table>
      </div>
      <!--[if mso]>
      </td><td width="320" valign="top">
      <![endif]-->
      <div class="column" style="display: inline-block; max-width: 320px; width: 100%; vertical-align: top;">
        <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0">
          <tr>
            <td style="padding: 20px;">
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0">
                <tr>
                  <td data-slot="heading" class="artcard-heading" style="padding: 0 0 8px; font-family: Arial, sans-serif; font-size: 20px; font-weight: bold; color: #444444; line-height: 1.3;">
                    Article Heading
                  </td>
                </tr>
                <tr>
                  <td data-slot="body_text" class="artcard-body" style="padding: 0 0 16px; font-family: Arial, sans-serif; font-size: 14px; color: #666666; line-height: 1.5;">
                    Article body text with a brief description of the content.
                  </td>
                </tr>
              </table>
              <a data-slot="cta_url" href="https://example.com/article" style="display: inline-block; padding: 10px 24px; background-color: #e84e0f; color: #ffffff; text-decoration: none; font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; border-radius: 4px;">
                <span data-slot="cta_text">Read More</span>
              </a>
            </td>
          </tr>
        </table>
      </div>
      <!--[if mso]>
      </td></tr></table>
      <![endif]-->
    </td>
  </tr>
</table>
    </td>
  </tr>
</table>

</td></tr></table>
<![endif]-->
