<!DOCTYPE html>
<html><head><meta charset="utf-8">
<title>Test: :has() selector</title>
<style>
body { margin: 0; padding: 20px; font-family: Arial, sans-serif; }
.pass { background: #00cc00; color: #fff; padding: 10px; }
.fail { background: #cc0000; color: #fff; padding: 10px; }
.parent:has(.child) { background: #00cc00; } .parent { width: 100px; height: 50px; background: #cc0000; }
</style></head>
<body>
<div class="parent"><span class="child">HAS</span></div>

</body></html>
