# Email Client Definitions for the Email Development Ontology
# Engine values: webkit | blink | word | gecko | presto | custom
# Market share values are approximate industry estimates (2025-2026).

clients:
  # ─── Outlook Family ───────────────────────────────────────────────────────────

  - id: outlook_2016_win
    name: "Outlook 2016 (Windows)"
    family: outlook
    platform: windows
    engine: word
    market_share: 3.2
    notes: >-
      Word 2016 rendering engine. Requires MSO conditionals (<!--[if mso]>) for
      reliable layout. No support for CSS background images, border-radius, or
      padding on inline elements. Tables required for multi-column layouts. VML
      needed for background images and rounded buttons. max-width ignored; use
      fixed-width tables. Limited CSS selector support — no attribute selectors,
      nth-child, or adjacent sibling combinators.
    tags: [desktop, enterprise]

  - id: outlook_2019_win
    name: "Outlook 2019 (Windows)"
    family: outlook
    platform: windows
    engine: word
    market_share: 8.1
    notes: >-
      Word 2019 rendering engine, marginally improved over 2016 but fundamentally
      the same limitations. MSO conditionals still required. Adds partial support
      for CSS list-style-type. Still no background images via CSS (VML required),
      no border-radius, no CSS gradients. DPI scaling can cause layout shifts on
      high-DPI displays. Retains the 1px gap bug on images — use display:block and
      font-size:0 on containing TDs.
    tags: [desktop, enterprise]

  - id: outlook_365_win
    name: "Outlook 365 (Windows)"
    family: outlook
    platform: windows
    engine: word
    market_share: 12.5
    notes: >-
      Word rendering engine with incremental updates via Microsoft 365 channel.
      Largest desktop Outlook segment. Same core Word limitations as 2016/2019 but
      receives periodic fixes. Supports CSS outline (partial). Still requires VML
      for background images and rounded shapes. The "New Outlook" desktop app uses
      the Outlook Web rendering engine instead — test both variants. MSO
      conditionals remain essential for layout parity.
    tags: [desktop, enterprise]

  - id: outlook_mac
    name: "Outlook for Mac"
    family: outlook
    platform: macos
    engine: webkit
    market_share: 2.8
    notes: >-
      WebKit-based rendering since Outlook for Mac 16.x, providing dramatically
      better CSS support than Windows counterparts. Supports CSS background images,
      border-radius, flexbox (partial), and media queries. Does not use the Word
      engine — MSO conditionals are ignored. Dark mode support via
      prefers-color-scheme media query. Some inline style specificity quirks when
      styles conflict with Outlook's own stylesheet. External web fonts load
      reliably.
    tags: [desktop, enterprise]

  - id: outlook_ios
    name: "Outlook for iOS"
    family: outlook
    platform: ios
    engine: webkit
    market_share: 3.5
    notes: >-
      WebKit rendering via iOS WKWebView. Good CSS support including media queries,
      background images, and border-radius. Supports dark mode via
      prefers-color-scheme. Auto-scales content to viewport width. Can trigger iOS
      auto-linking for phone numbers, dates, and addresses — use
      meta[name=format-detection] to control. Respects Dynamic Type accessibility
      settings which can override font sizes. Inline images render well; external
      images load by default.
    tags: [mobile, enterprise]

  - id: outlook_android
    name: "Outlook for Android"
    family: outlook
    platform: android
    engine: blink
    market_share: 2.1
    notes: >-
      Blink-based rendering via Android WebView. Decent CSS support but
      inconsistent across Android OS versions and device manufacturers. Media
      queries supported. Dark mode behavior varies — may auto-invert colors or
      respect prefers-color-scheme depending on OS version and app settings.
      Background images work via CSS. Some padding/margin calculation differences
      compared to iOS counterpart. External images blocked by default in some
      enterprise configurations.
    tags: [mobile, enterprise]

  - id: outlook_web
    name: "Outlook.com / Outlook Web App"
    family: outlook
    platform: web
    engine: custom
    market_share: 4.0
    notes: >-
      Custom rendering pipeline with aggressive CSS stripping. Renames CSS classes
      and IDs with unique prefixes, breaking class-based selectors. Strips
      <style> blocks in some configurations — inline styles safest. Supports
      attribute selectors on data-* attributes as a workaround. Removes
      position, float, and display:flex. Supports background images via CSS
      (unlike Word-based Outlook). No media query support in OWA; responsive
      design via fluid tables only. The "New Outlook" desktop app shares this
      rendering engine.
    tags: [webmail, enterprise]

  # ─── Gmail Family ─────────────────────────────────────────────────────────────

  - id: gmail_web
    name: "Gmail (Web)"
    family: gmail
    platform: web
    engine: custom
    market_share: 18.0
    notes: >-
      Largest webmail client. Custom sanitiser strips CSS classes, renames IDs,
      and removes <link> and <style> blocks unless the email is under ~102KB.
      Supported <style> blocks must not contain media queries or @import. Clips
      emails exceeding ~102KB with a "View entire message" link — critical
      threshold for file size QA. No support for CSS position, overflow, or
      form elements. AMP for Email enabled for dynamic content. Background
      images work only via inline CSS. Dark mode applies automatic color
      inversion; use data-ogsc/data-ogsb attributes for control.
    tags: [webmail, consumer]

  - id: gmail_ios
    name: "Gmail (iOS)"
    family: gmail
    platform: ios
    engine: webkit
    market_share: 5.2
    notes: >-
      WebKit rendering via iOS WKWebView, providing better CSS support than Gmail
      Web. Supports <style> blocks and media queries. Does not apply the same
      aggressive class stripping as Gmail Web — embedded styles generally survive.
      Still subject to the 102KB clipping threshold. Dark mode behavior controlled
      by iOS system settings. Auto-linking for phone numbers and addresses applies.
      External images loaded by default. Responsive layouts via media queries work
      reliably.
    tags: [mobile, consumer]

  - id: gmail_android
    name: "Gmail (Android)"
    family: gmail
    platform: android
    engine: blink
    market_share: 6.8
    notes: >-
      Blink rendering via Android WebView. Supports <style> blocks and media
      queries similarly to Gmail iOS. Subject to the 102KB clipping threshold.
      Rendering consistency varies across Android versions and device
      manufacturers. Dark mode auto-inversion can be unpredictable — use
      color-scheme meta tag and prefers-color-scheme media query for control.
      External images may be proxied through Google's image cache, which can
      affect tracking pixels. Some CSS animation support.
    tags: [mobile, consumer]

  # ─── Apple Family ─────────────────────────────────────────────────────────────

  - id: apple_mail_macos
    name: "Apple Mail (macOS)"
    family: apple
    platform: macos
    engine: webkit
    market_share: 7.5
    notes: >-
      Full WebKit rendering — the gold standard for CSS support in email.
      Supports media queries, CSS animations, web fonts, flexbox, grid (partial),
      SVG, and background images. Dark mode auto-inverts light backgrounds and
      adjusts text colors unless controlled via prefers-color-scheme and
      color-scheme meta tag. Supports srcset for responsive images. Mail Privacy
      Protection (macOS 12+) pre-fetches all images via proxy, affecting open
      tracking and geolocation. The most permissive email renderer available.
    tags: [desktop, consumer]

  - id: apple_mail_ios
    name: "Apple Mail (iOS/iPadOS)"
    family: apple
    platform: ios
    engine: webkit
    market_share: 12.0
    notes: >-
      WebKit rendering with near-identical CSS support to macOS Apple Mail. Largest
      mobile email client segment. Dark mode auto-inversion applies by default —
      use color-scheme meta tag and prefers-color-scheme for fine control.
      Respects Dynamic Type accessibility settings, which can scale fonts beyond
      specified sizes. Auto-links phone numbers, dates, and addresses (control via
      meta[name=format-detection]). Mail Privacy Protection pre-fetches images.
      Supports interactive AMP-like features via WebKit capabilities.
    tags: [mobile, consumer]

  # ─── Yahoo Family ─────────────────────────────────────────────────────────────

  - id: yahoo_web
    name: "Yahoo Mail (Web)"
    family: yahoo
    platform: web
    engine: custom
    market_share: 3.0
    notes: >-
      Custom rendering with aggressive !important overrides on many CSS
      properties, particularly colors, fonts, and spacing. Injects its own
      stylesheet that can override email styles. Supports <style> blocks but
      rewrites selectors. Removes CSS position and some display values. Media
      queries partially supported. Background images work via inline CSS.
      Class-based targeting unreliable due to selector rewriting. Use highly
      specific inline styles with !important as a last resort for critical
      visual properties.
    tags: [webmail, consumer]

  - id: yahoo_ios
    name: "Yahoo Mail (iOS)"
    family: yahoo
    platform: ios
    engine: webkit
    market_share: 1.2
    notes: >-
      WebKit rendering via iOS WKWebView, offering significantly better CSS
      support than Yahoo Web. Media queries and <style> blocks supported. Less
      aggressive !important overrides compared to the web version. Dark mode
      follows iOS system settings. External images loaded by default. Generally
      reliable for responsive email designs. Auto-linking behavior for phone
      numbers and addresses applies via iOS conventions.
    tags: [mobile, consumer]

  - id: yahoo_android
    name: "Yahoo Mail (Android)"
    family: yahoo
    platform: android
    engine: blink
    market_share: 0.8
    notes: >-
      Blink rendering via Android WebView. Better CSS support than Yahoo Web but
      less consistent than the iOS counterpart. Supports media queries and
      <style> blocks. Some !important override behavior inherited from the Yahoo
      platform. Dark mode behavior varies by Android version and device. Smaller
      user base but still requires testing for Yahoo-heavy audience segments.
    tags: [mobile, consumer]

  # ─── Samsung ──────────────────────────────────────────────────────────────────

  - id: samsung_mail
    name: "Samsung Mail"
    family: samsung
    platform: android
    engine: blink
    market_share: 2.5
    notes: >-
      Blink rendering via Samsung's customised Android WebView. Partial dark mode
      support — may auto-invert colors inconsistently, sometimes inverting images
      or leaving background colors unchanged. Font rendering differences due to
      Samsung's default font stack (SamsungOne). Media queries supported.
      Background images work via CSS. Some versions have issues with line-height
      and letter-spacing calculations. Pre-installed on Samsung Galaxy devices,
      making it significant in markets with high Samsung penetration.
    tags: [mobile, consumer]

  # ─── Thunderbird ──────────────────────────────────────────────────────────────

  - id: thunderbird
    name: "Mozilla Thunderbird"
    family: thunderbird
    platform: desktop
    engine: gecko
    market_share: 1.0
    notes: >-
      Gecko rendering engine providing good CSS support including media queries,
      CSS animations (partial), and background images. Blocks remote images by
      default — users must explicitly load them. Supports <style> blocks and
      complex selectors. No JavaScript execution. SVG support is partial.
      Popular among privacy-conscious and technical users. Supernova (v115+)
      modernised the UI but retained Gecko rendering behavior. Web fonts not
      loaded due to remote content blocking.
    tags: [desktop, privacy]

  # ─── Other Webmail ────────────────────────────────────────────────────────────

  - id: aol_web
    name: "AOL Mail (Web)"
    family: aol
    platform: web
    engine: custom
    market_share: 0.5
    notes: >-
      Custom rendering engine now operated by Yahoo (Verizon Media). Shares many
      rendering characteristics with Yahoo Mail Web, including !important
      overrides and selector rewriting. Supports <style> blocks with limitations.
      Legacy user base skews older demographic. External images loaded by default.
      Testing against Yahoo Web generally covers most AOL rendering issues.
    tags: [webmail, consumer, legacy]

  - id: protonmail_web
    name: "ProtonMail (Web)"
    family: protonmail
    platform: web
    engine: custom
    market_share: 0.8
    notes: >-
      Aggressive CSS sanitisation pipeline for security. Blocks all external
      images by default (loaded only on user action) and strips remote resource
      references. Rewrites CSS selectors and removes potentially dangerous
      properties. No JavaScript, no form elements, no iframes. Strips tracking
      pixels and link redirectors. Background images via external URLs blocked.
      Data URI images may work for small assets. Privacy-focused user base expects
      minimal tracking. Growing market share among security-conscious users.
    tags: [webmail, privacy, security]

  - id: hey_web
    name: "HEY (Web)"
    family: hey
    platform: web
    engine: custom
    market_share: 0.2
    notes: >-
      Custom rendering by Basecamp/37signals. Opinionated email philosophy —
      strips most formatting and presents emails in a simplified, reader-friendly
      view. Heavy CSS sanitisation removes layout tables, background colors, and
      complex styling. Inline images displayed but external tracking pixels may be
      blocked. Very small but vocal user base. Designing specifically for HEY is
      rarely worthwhile; focus on graceful degradation and strong plain-text
      fallbacks.
    tags: [webmail, privacy]

  - id: fastmail_web
    name: "Fastmail (Web)"
    family: fastmail
    platform: web
    engine: custom
    market_share: 0.3
    notes: >-
      Custom rendering with moderate CSS sanitisation. Supports <style> blocks
      and most common CSS properties. Blocks external images by default with a
      click-to-load prompt. Good support for semantic HTML and accessible markup.
      Relatively developer-friendly rendering compared to other privacy-focused
      clients. Strips JavaScript and form elements. Small but technically
      sophisticated user base. Australian-based service with growing international
      adoption.
    tags: [webmail, privacy]

  - id: comcast_web
    name: "Comcast/Xfinity Mail (Web)"
    family: comcast
    platform: web
    engine: custom
    market_share: 0.5
    notes: >-
      Custom rendering engine with moderate CSS support. Supports <style> blocks
      and inline styles. Some CSS properties stripped or overridden. External
      images loaded by default. Legacy webmail interface with limited modern CSS
      support — avoid CSS grid, flexbox, and advanced selectors. Significant in
      the US market due to Comcast/Xfinity ISP subscriber base. Testing is
      important for US-focused B2C campaigns.
    tags: [webmail, consumer, isp]

  - id: t_online_web
    name: "T-Online Mail (Web)"
    family: t_online
    platform: web
    engine: custom
    market_share: 0.4
    notes: >-
      Custom rendering engine operated by Deutsche Telekom. Primarily relevant for
      the German market. Moderate CSS support with inline styles preferred. Some
      <style> block support but complex selectors may be stripped. External images
      loaded by default. Limited documentation on rendering quirks — test
      empirically for German-market campaigns. Important for DACH region email
      campaigns.
    tags: [webmail, consumer, isp, dach]

  - id: gmx_web
    name: "GMX Mail (Web)"
    family: gmx
    platform: web
    engine: custom
    market_share: 0.6
    notes: >-
      Custom rendering engine operated by United Internet (also powers web.de).
      Major webmail provider in Germany and Austria. Moderate CSS support — inline
      styles work reliably, <style> blocks partially supported. Some aggressive
      rewriting of class names and IDs. External images loaded by default.
      Shares rendering behavior with web.de Mail. Critical for DACH region email
      campaigns. Limited English-language documentation on rendering specifics.
    tags: [webmail, consumer, isp, dach]

  - id: windows_mail
    name: "Windows Mail (Windows 10/11)"
    family: windows_mail
    platform: windows
    engine: word
    market_share: 0.8
    notes: >-
      Built-in Windows 10/11 mail client. Uses Word rendering engine similar to
      Outlook desktop. Limited CSS support mirrors Outlook Windows behavior.
      Dark mode follows system settings. Declining usage as users migrate to
      Outlook or web clients.
    tags: [desktop, consumer]
