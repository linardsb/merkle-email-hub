# Hub's own capability manifest — used for competitive gap analysis
# Each entry maps to a Hub feature/agent

hub_capabilities:
  # Builder
  - id: code_editor
    name: Monaco Code Editor
    category: builder
    agent: ""
    description: Full Monaco editor with HTML/CSS/Liquid syntax, Can I Email autocomplete

  - id: visual_drag_drop_builder
    name: Visual Liquid Builder
    category: builder
    agent: ""
    description: Drag-and-drop block composition with Liquid template syntax

  - id: template_library
    name: Template Library
    category: builder
    agent: ""
    description: Versioned email template management with soft delete and restore

  - id: modular_design_system
    name: Component Library
    category: builder
    agent: ""
    description: Versioned reusable email components with dark mode variants

  # AI agents (Hub differentiators)
  - id: ai_code_generation
    name: AI Scaffolder Agent
    category: ai
    agent: scaffolder
    description: Campaign brief → complete Maizzle HTML with table layouts, MSO conditionals, VML

  - id: ai_content_generation
    name: AI Content Agent
    category: ai
    agent: content
    description: Subject lines, preheaders, CTA text, tone adjustment, anti-spam

  - id: ai_image_generation
    name: AI Image Generation
    category: ai
    agent: ""
    description: AI-generated images with style presets for email content

  - id: ai_innovation_prototyping
    name: Innovation Agent
    category: ai
    agent: innovation
    description: Experimental technique prototyping with feasibility assessment and fallback generation

  - id: ai_knowledge_qa
    name: Knowledge Agent
    category: ai
    agent: knowledge
    description: RAG-powered Q&A from email development knowledge base with citations

  - id: ai_code_review
    name: Code Review Agent
    category: ai
    agent: code_reviewer
    description: Static analysis — redundant code, CSS support, nesting, file size optimisation

  - id: ai_self_correction_pipeline
    name: Blueprint Self-Correction Pipeline
    category: ai
    agent: ""
    description: State machine engine with QA gating, recovery routing, bounded self-correction

