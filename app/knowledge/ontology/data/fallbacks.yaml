    technique: "class_names"
    code_example: |
      <!-- prefers-color-scheme unsupported by Gmail, Yahoo, Word Outlooks.
           Use [data-ogsc] and [data-ogsb] for Outlook.com/365,
           and class-based overrides for Gmail dark mode. -->
      <style>
        /* Apple Mail, Outlook Mac, iOS */
        @media (prefers-color-scheme: dark) {
          .dark-bg { background-color: #1a1a2e !important; }
          .dark-text { color: #e0e0e0 !important; }
        }
        /* Outlook.com / Outlook 365 web */
        [data-ogsc] .dark-text { color: #e0e0e0 !important; }
        [data-ogsb] .dark-bg { background-color: #1a1a2e !important; }
