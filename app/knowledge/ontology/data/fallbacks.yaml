# Fallback/workaround relationships for CSS properties in email development.
# Each entry maps an unsupported CSS property to its fallback technique,
# the clients that require it, and a working code example.

fallbacks:
  # ─── Layout Fallbacks ──────────────────────────────────────────────────────────

  - id: flex_to_table
    source_property_id: display_flex
    target_property_id: display_table
    client_ids: [outlook_2016_win, outlook_2019_win, outlook_365_win, gmail_web, outlook_web, yahoo_web]
    technique: "table_layout"
    code_example: |
      <!-- Flexbox fallback: table layout -->
      <!--[if mso]>
      <table role="presentation" width="100%" cellpadding="0" cellspacing="0"><tr>
      <td width="300" valign="top">
      <![endif]-->
      <div style="display:flex; gap:20px;">
        <div style="flex:1;">Column 1</div>
      <!--[if mso]></td><td width="300" valign="top"><![endif]-->
        <div style="flex:1;">Column 2</div>
      </div>
      <!--[if mso]></td></tr></table><![endif]-->

  - id: grid_to_table
    source_property_id: display_grid
    target_property_id: display_table
    client_ids: [outlook_2016_win, outlook_2019_win, outlook_365_win, gmail_web, yahoo_web]
    technique: "table_layout"
    code_example: |
      <!-- CSS Grid fallback: nested tables -->
      <!--[if mso]>
      <table role="presentation" width="600" cellpadding="0" cellspacing="0">
        <tr>
          <td width="200" valign="top">
      <![endif]-->
      <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:16px;">
        <div>Cell 1</div>
      <!--[if mso]></td><td width="200" valign="top"><![endif]-->
        <div>Cell 2</div>
      <!--[if mso]></td><td width="200" valign="top"><![endif]-->
        <div>Cell 3</div>
      </div>
      <!--[if mso]></td></tr></table><![endif]-->

  - id: inline_block_to_table_cell
    source_property_id: display_inline_block
    target_property_id: display_table_cell
    client_ids: [outlook_2016_win, outlook_2019_win, outlook_365_win]
    technique: "table_layout"
    code_example: |
      <!-- inline-block fallback for Word-based Outlooks -->
      <!--[if mso]>
      <table role="presentation" cellpadding="0" cellspacing="0"><tr>
      <td valign="top" style="padding:0 10px;">
      <![endif]-->
      <div style="display:inline-block; vertical-align:top; width:200px;">
        Block content
      </div>
      <!--[if mso]></td></tr></table><![endif]-->

  - id: position_fixed_to_static
    source_property_id: position_fixed
    target_property_id: position_static
    client_ids: [outlook_2016_win, outlook_2019_win, outlook_365_win, gmail_web, gmail_android, yahoo_web, outlook_web]
    technique: "remove"
    code_example: |
      <!-- position:fixed is stripped by all major email clients.
           Use normal document flow instead. -->
      <div style="width:100%; background:#333; color:#fff; padding:12px; text-align:center;">
        Persistent banner — placed in normal flow at top of email
      </div>

  - id: position_sticky_to_static
    source_property_id: position_sticky
    target_property_id: position_static
    client_ids: [outlook_2016_win, outlook_2019_win, outlook_365_win, gmail_web, gmail_android, yahoo_web, outlook_web]
    technique: "remove"
    code_example: |
      <!-- position:sticky is not supported in email clients.
           Place the element inline in normal flow. -->
      <div style="background:#f8f8f8; padding:10px; border-bottom:1px solid #ddd;">
        Navigation bar — rendered in-flow (no sticky behaviour)
      </div>

  - id: position_absolute_to_mso
    source_property_id: position_absolute
    target_property_id: mso_position_horizontal
    client_ids: [outlook_2016_win, outlook_2019_win, outlook_365_win]
    technique: "mso_conditional"
    code_example: |
      <!-- position:absolute fallback for Word Outlooks using MSO properties -->
      <!--[if mso]>
      <v:rect style="position:absolute; left:20px; top:10px; width:120px; height:40px;"
              fillcolor="#0066cc" stroked="false">
        <v:textbox inset="0,0,0,0">
      <![endif]-->
      <div style="position:absolute; left:20px; top:10px;">
        Overlay content
      </div>
      <!--[if mso]></v:textbox></v:rect><![endif]-->

  - id: flexbox_gap_to_margin
    source_property_id: gap
    target_property_id: margin
    client_ids: [outlook_2016_win, outlook_2019_win, outlook_365_win, gmail_web, yahoo_web, outlook_web]
    technique: "margin_on_children"
    code_example: |
      <!-- gap fallback: margin on child elements -->
      <div style="display:flex; gap:16px;">
        <!--[if mso]>
        <table role="presentation" cellpadding="0" cellspacing="0"><tr>
        <td style="padding-right:16px;">
        <![endif]-->
        <div style="margin-right:16px;">Item 1</div>
        <!--[if mso]></td><td><![endif]-->
        <div>Item 2</div>
        <!--[if mso]></td></tr></table><![endif]-->
      </div>

  - id: max_width_to_width_attr
    source_property_id: max_width
    target_property_id: width_attr
    client_ids: [outlook_2016_win, outlook_2019_win, outlook_365_win]
    technique: "html_attribute"
    code_example: |
      <!-- max-width ignored by Word Outlooks; use width attribute -->
      <!--[if mso]>
      <table role="presentation" width="600" cellpadding="0" cellspacing="0">
      <tr><td>
      <![endif]-->
      <div style="max-width:600px; margin:0 auto;">
        Content constrained to 600px
      </div>
      <!--[if mso]></td></tr></table><![endif]-->

  - id: overflow_hidden_to_clip
    source_property_id: overflow_hidden
    target_property_id: clip_rect
    client_ids: [outlook_2016_win, outlook_2019_win, outlook_365_win]
    technique: "mso_conditional"
    code_example: |
      <!-- overflow:hidden fallback for Word Outlooks -->
      <!--[if mso]>
      <v:rect style="width:300px; height:200px;" stroked="false">
        <v:textbox style="mso-fit-shape-to-text:false;" inset="0,0,0,0">
      <![endif]-->
      <div style="overflow:hidden; width:300px; height:200px;">
        Content clipped to container
      </div>
      <!--[if mso]></v:textbox></v:rect><![endif]-->

  - id: float_to_align
    source_property_id: float
    target_property_id: align_attr
    client_ids: [outlook_2016_win, outlook_2019_win, outlook_365_win, gmail_web, yahoo_web]
    technique: "html_attribute"
    code_example: |
      <!-- float fallback: use align attribute on table -->
      <!--[if mso]>
      <table role="presentation" align="left" width="260" cellpadding="0" cellspacing="0">
      <tr><td>
      <![endif]-->
      <div style="float:left; width:260px;">
        Left-aligned content
      </div>
      <!--[if mso]></td></tr></table><![endif]-->

  # ─── Typography Fallbacks ───────────────────────────────────────────────────────

  - id: web_font_to_system
    source_property_id: font_face
    target_property_id: font_family_system
    client_ids: [outlook_2016_win, outlook_2019_win, outlook_365_win, gmail_web, gmail_android, yahoo_web]
    technique: "font_stack"
    code_example: |
      <!-- Web font with system font fallback stack -->
      <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700');
      </style>
      <p style="font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI',
                Roboto, Helvetica, Arial, sans-serif;">
        Text with web font and system fallback
      </p>

  - id: text_shadow_to_none
    source_property_id: text_shadow
    target_property_id: none
    client_ids: [outlook_2016_win, outlook_2019_win, outlook_365_win]
    technique: "remove"
    code_example: |
      <!-- text-shadow ignored by Word Outlooks; ensure text is legible without it -->
      <h1 style="color:#ffffff; text-shadow:0 2px 4px rgba(0,0,0,0.5);">
        Heading — readable with or without shadow on dark background
      </h1>
      <!-- Ensure sufficient contrast without shadow (WCAG AA 4.5:1) -->

  - id: word_break_to_wbr
    source_property_id: word_break
    target_property_id: wbr_element
    client_ids: [outlook_2016_win, outlook_2019_win, outlook_365_win, gmail_web]
    technique: "html_element"
    code_example: |
      <!-- word-break fallback: insert <wbr> at break opportunities -->
      <td style="word-break:break-all;">
        superlongurl<wbr>thatmight<wbr>overflow<wbr>thecontainer.com
      </td>

  - id: letter_spacing_to_mso
    source_property_id: letter_spacing
    target_property_id: mso_font_width
    client_ids: [outlook_2016_win, outlook_2019_win, outlook_365_win]
    technique: "mso_property"
    code_example: |
      <!-- letter-spacing fallback for Word Outlooks -->
      <span style="letter-spacing:2px; mso-font-width:120%;">
        S P A C E D   T E X T
      </span>

  - id: line_height_to_mso
    source_property_id: line_height
    target_property_id: mso_line_height_rule
    client_ids: [outlook_2016_win, outlook_2019_win, outlook_365_win]
    technique: "mso_property"
    code_example: |
      <!-- line-height rendered inconsistently in Word Outlooks -->
      <p style="line-height:24px; mso-line-height-rule:exactly;">
        Text with exact line-height enforced in Outlook
      </p>

  # ─── Color / Background Fallbacks ───────────────────────────────────────────────

  - id: gradient_to_solid
    source_property_id: linear_gradient
    target_property_id: background_color
    client_ids: [outlook_2016_win, outlook_2019_win, outlook_365_win, gmail_android, yahoo_web]
    technique: "solid_color_fallback"
    code_example: |
      <!-- CSS gradient with solid color fallback -->
      <div style="background-color:#0066cc; background-image:linear-gradient(135deg, #0066cc, #004499);">
        <!-- Clients that strip gradients see solid #0066cc -->
        Gradient content
      </div>

  - id: radial_gradient_to_solid
    source_property_id: radial_gradient
    target_property_id: background_color
    client_ids: [outlook_2016_win, outlook_2019_win, outlook_365_win, gmail_android, yahoo_web]
    technique: "solid_color_fallback"
    code_example: |
      <!-- Radial gradient with solid fallback -->
      <div style="background-color:#1a1a2e; background-image:radial-gradient(circle at center, #16213e, #1a1a2e);">
        Content over radial gradient
      </div>

  - id: rgba_to_hex
    source_property_id: rgba
    target_property_id: hex_color
    client_ids: [outlook_2016_win, outlook_2019_win]
    technique: "solid_color_fallback"
    code_example: |
      <!-- rgba() fallback: declare hex colour first -->
      <div style="background-color:#0066cc; background-color:rgba(0,102,204,0.85);">
        Semi-transparent background — opaque fallback in old Outlooks
      </div>

  - id: opacity_to_filter
    source_property_id: opacity
    target_property_id: filter_alpha
    client_ids: [outlook_2016_win, outlook_2019_win, outlook_365_win]
    technique: "mso_conditional"
    code_example: |
      <!-- opacity fallback using MSO conditional filter -->
      <!--[if mso]>
      <div style="filter:alpha(opacity=70);">
      <![endif]-->
      <!--[if !mso]><!-->
      <div style="opacity:0.7;">
      <!--<![endif]-->
        Semi-transparent content
      </div>

  - id: background_size_to_attr
    source_property_id: background_size
    target_property_id: vml_fill
    client_ids: [outlook_2016_win, outlook_2019_win, outlook_365_win]
    technique: "vml"
    code_example: |
      <!-- background-size:cover fallback using VML fill -->
      <!--[if mso]>
      <v:rect xmlns:v="urn:schemas-microsoft-com:vml" fill="true" stroke="false"
              style="width:600px; height:400px;">
        <v:fill type="frame" src="https://example.com/hero.jpg" />
        <v:textbox inset="0,0,0,0">
      <![endif]-->
      <div style="background-image:url('https://example.com/hero.jpg');
                  background-size:cover; background-position:center;
                  width:600px; height:400px;">
        Hero content
      </div>
      <!--[if mso]></v:textbox></v:rect><![endif]-->

  - id: background_image_to_vml
    source_property_id: background_image
    target_property_id: vml_fill
    client_ids: [outlook_2016_win, outlook_2019_win, outlook_365_win]
    technique: "vml"
    code_example: |
      <!-- CSS background-image fallback using VML -->
      <!--[if mso]>
      <v:rect xmlns:v="urn:schemas-microsoft-com:vml" fill="true" stroke="false"
              style="width:600px; height:300px;">
        <v:fill type="tile" src="https://example.com/bg-pattern.png" color="#f5f5f5" />
        <v:textbox style="mso-fit-shape-to-text:true;" inset="20px,20px,20px,20px">
      <![endif]-->
      <div style="background-image:url('https://example.com/bg-pattern.png');
                  background-color:#f5f5f5; padding:20px;">
        Content over background image
      </div>
      <!--[if mso]></v:textbox></v:rect><![endif]-->

  - id: mix_blend_to_none
    source_property_id: mix_blend_mode
    target_property_id: none
    client_ids: [outlook_2016_win, outlook_2019_win, outlook_365_win, gmail_web, gmail_android, yahoo_web, outlook_web]
    technique: "remove"
    code_example: |
      <!-- mix-blend-mode unsupported in email; ensure design works without blending -->
      <div style="position:relative;">
        <img src="base-image.jpg" alt="Base" width="600" style="display:block;" />
        <!-- Overlay rendered as solid colour (no blend effect) in email clients -->
        <div style="mix-blend-mode:multiply; background-color:rgba(0,50,100,0.4);">
          Overlay text
        </div>
      </div>

  - id: filter_blur_to_none
    source_property_id: filter_blur
    target_property_id: none
    client_ids: [outlook_2016_win, outlook_2019_win, outlook_365_win, gmail_web, gmail_android, yahoo_web]
    technique: "remove"
    code_example: |
      <!-- filter:blur() stripped by most email clients.
           Use a pre-blurred image instead. -->
      <img src="hero-blurred.jpg" alt="Background"
           style="filter:blur(8px); width:100%; display:block;" />
      <!-- Pre-process the blur server-side for universal support -->

  - id: backdrop_filter_to_none
    source_property_id: backdrop_filter
    target_property_id: background_color
    client_ids: [outlook_2016_win, outlook_2019_win, outlook_365_win, gmail_web, gmail_android, yahoo_web, outlook_web]
    technique: "solid_color_fallback"
    code_example: |
      <!-- backdrop-filter unsupported; use semi-opaque background instead -->
      <div style="background-color:rgba(255,255,255,0.9);
                  backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px);
                  padding:20px;">
        <!-- Falls back to solid rgba background (or opaque in older clients) -->
        Content with frosted glass effect
      </div>

  # ─── Border / Shadow Fallbacks ──────────────────────────────────────────────────

  - id: border_radius_to_vml
    source_property_id: border_radius
    target_property_id: vml_roundrect
    client_ids: [outlook_2016_win, outlook_2019_win, outlook_365_win]
    technique: "vml"
    code_example: |
      <!-- border-radius fallback: VML roundrect for Word Outlooks -->
      <!--[if mso]>
      <v:roundrect xmlns:v="urn:schemas-microsoft-com:vml"
                   xmlns:w="urn:schemas-microsoft-com:office:word"
                   href="https://example.com" style="height:44px; v-text-anchor:middle;
                   width:200px;" arcsize="14%" strokecolor="#0066cc"
                   fillcolor="#0066cc">
        <w:anchorlock/>
        <center style="color:#ffffff; font-family:sans-serif; font-size:16px;
                       font-weight:bold;">
          Click Here
        </center>
      </v:roundrect>
      <![endif]-->
      <!--[if !mso]><!-->
      <a href="https://example.com" style="background-color:#0066cc; border-radius:6px;
         color:#ffffff; display:inline-block; font-size:16px; font-weight:bold;
         padding:12px 32px; text-decoration:none;">
        Click Here
      </a>
      <!--<![endif]-->

  - id: box_shadow_to_border
    source_property_id: box_shadow
    target_property_id: border
    client_ids: [outlook_2016_win, outlook_2019_win, outlook_365_win]
    technique: "border_fallback"
    code_example: |
      <!-- box-shadow fallback: use border for Word Outlooks -->
      <div style="box-shadow:0 2px 8px rgba(0,0,0,0.15);
                  border:1px solid #e0e0e0; padding:20px;">
        <!-- Word Outlooks render the border; modern clients see the shadow -->
        Card content
      </div>

  - id: outline_to_border
    source_property_id: outline
    target_property_id: border
    client_ids: [outlook_2016_win, outlook_2019_win, gmail_web]
    technique: "border_fallback"
    code_example: |
      <!-- outline fallback: border as visual equivalent -->
      <a href="#" style="outline:2px solid #0066cc; outline-offset:2px;
                         border:2px solid #0066cc; padding:8px 16px;
                         text-decoration:none; color:#0066cc;">
        Focused link style
      </a>

  - id: box_decoration_break_to_none
    source_property_id: box_decoration_break
    target_property_id: none
    client_ids: [outlook_2016_win, outlook_2019_win, outlook_365_win, gmail_web, gmail_android, yahoo_web]
    technique: "remove"
    code_example: |
      <!-- box-decoration-break:clone unsupported in most email clients.
           Wrap each line segment in its own span for multi-line highlights. -->
      <span style="background-color:#ffffcc; padding:4px 8px;
                   -webkit-box-decoration-break:clone;
                   box-decoration-break:clone;">
        Highlighted text that may wrap across lines
      </span>

  # ─── Transform / Animation Fallbacks ────────────────────────────────────────────

  - id: transform_to_none
    source_property_id: transform
    target_property_id: none
    client_ids: [outlook_2016_win, outlook_2019_win, outlook_365_win, gmail_web, gmail_android, yahoo_web]
    technique: "remove"
    code_example: |
      <!-- CSS transforms stripped by email clients.
           Position elements with margin/padding instead. -->
      <div style="margin-left:20px; margin-top:-10px;">
        <!-- Use margin to approximate translateX(20px) translateY(-10px) -->
        Repositioned content
      </div>

  - id: transition_to_none
    source_property_id: transition
    target_property_id: none
    client_ids: [outlook_2016_win, outlook_2019_win, outlook_365_win, gmail_web, gmail_android, yahoo_web, outlook_web]
    technique: "remove"
    code_example: |
      <!-- CSS transitions stripped by all major email clients.
           Ensure hover states are usable as instant changes. -->
      <style>
        .cta-btn:hover { background-color: #004499 !important; }
      </style>
      <a class="cta-btn" href="#" style="background-color:#0066cc; color:#fff;
         padding:12px 24px; text-decoration:none; display:inline-block;">
        Button — instant colour change on hover (no transition)
      </a>

  - id: animation_to_none
    source_property_id: animation
    target_property_id: none
    client_ids: [outlook_2016_win, outlook_2019_win, outlook_365_win, gmail_web, gmail_android, yahoo_web, outlook_web]
    technique: "remove"
    code_example: |
      <!-- CSS animations stripped by email clients.
           Design the static "end state" as the default view. -->
      <div style="opacity:1;">
        <!-- No fade-in animation — content visible immediately -->
        Content that would have animated in
      </div>

  - id: scale_to_width
    source_property_id: transform_scale
    target_property_id: width
    client_ids: [outlook_2016_win, outlook_2019_win, outlook_365_win, gmail_web, gmail_android, yahoo_web]
    technique: "html_attribute"
    code_example: |
      <!-- transform:scale() fallback: set explicit dimensions -->
      <img src="icon.png" alt="Icon"
           width="48" height="48"
           style="width:48px; height:48px;" />
      <!-- Rather than transform:scale(1.5) on a 32x32, serve at target size -->

  - id: rotate_to_vml
    source_property_id: transform_rotate
    target_property_id: vml_rotation
    client_ids: [outlook_2016_win, outlook_2019_win, outlook_365_win]
    technique: "vml"
    code_example: |
      <!-- transform:rotate() fallback using VML rotation for Word Outlooks -->
      <!--[if mso]>
      <v:shape style="width:100px; height:100px; rotation:45;"
               coordsize="100,100" path="m 0,0 l 100,0, 100,100, 0,100 x e"
               fillcolor="#0066cc" stroked="false">
        <v:textbox inset="0,0,0,0">
          <center style="color:#fff;">45&deg;</center>
        </v:textbox>
      </v:shape>
      <![endif]-->
      <!--[if !mso]><!-->
      <div style="transform:rotate(45deg); width:100px; height:100px;
                  background:#0066cc; color:#fff; text-align:center; line-height:100px;">
        45&deg;
      </div>
      <!--<![endif]-->

  # ─── Selector Fallbacks ─────────────────────────────────────────────────────────

  - id: hover_to_static
    source_property_id: pseudo_hover
    target_property_id: static_style
    client_ids: [gmail_web, gmail_android, yahoo_web, outlook_android]
    technique: "remove"
    code_example: |
      <!-- :hover stripped by Gmail, Yahoo, and mobile clients.
           Ensure the default (non-hover) state is the final design. -->
      <a href="#" style="background-color:#0066cc; color:#ffffff;
         padding:12px 24px; text-decoration:none; display:inline-block;">
        <!-- Link is fully styled without hover — hover is progressive enhancement -->
        Call to Action
      </a>
      <style>
        /* Only Apple Mail, Outlook.com, and some desktop clients honour this */
        .cta:hover { background-color: #004499 !important; }
      </style>

  - id: nth_child_to_class
    source_property_id: pseudo_nth_child
    target_property_id: class_selector
    client_ids: [outlook_2016_win, outlook_2019_win, outlook_365_win, gmail_web, gmail_android, yahoo_web]
    technique: "class_names"
    code_example: |
      <!-- :nth-child() unsupported in many email clients.
           Use explicit classes for alternating styles. -->
      <tr class="row-odd" style="background-color:#f9f9f9;">
        <td>Row 1</td>
      </tr>
      <tr class="row-even" style="background-color:#ffffff;">
        <td>Row 2</td>
      </tr>
      <tr class="row-odd" style="background-color:#f9f9f9;">
        <td>Row 3</td>
      </tr>

  - id: before_after_to_span
    source_property_id: pseudo_before_after
    target_property_id: span_element
    client_ids: [outlook_2016_win, outlook_2019_win, outlook_365_win, gmail_web, gmail_android, yahoo_web]
    technique: "html_element"
    code_example: |
      <!-- ::before/::after stripped by most email clients.
           Insert content inline with <span> elements. -->
      <p>
        <span style="color:#e74c3c; font-weight:bold;">&#x2605; </span>
        Featured item
        <span style="color:#999; font-size:12px;"> — limited time</span>
      </p>

  - id: has_to_js
    source_property_id: pseudo_has
    target_property_id: class_selector
    client_ids: [outlook_2016_win, outlook_2019_win, outlook_365_win, gmail_web, gmail_android, yahoo_web, outlook_web, apple_mail]
    technique: "class_names"
    code_example: |
      <!-- :has() has minimal email client support.
           Apply styles directly with classes instead of relational selectors. -->
      <!-- Instead of: .card:has(img) { padding-top: 0; } -->
      <div class="card card--has-image" style="padding-top:0;">
        <img src="hero.jpg" alt="Hero" width="100%" style="display:block;" />
        <div style="padding:16px;">Card content</div>
      </div>

  - id: attribute_selector_to_class
    source_property_id: attribute_selector
    target_property_id: class_selector
    client_ids: [outlook_2016_win, outlook_2019_win, outlook_365_win, gmail_web, gmail_android]
    technique: "class_names"
    code_example: |
      <!-- Attribute selectors [data-x] not supported in many email clients.
           Use class names instead. -->
