# Client IDs:
#   outlook_2016_win, outlook_2019_win, outlook_365_win, outlook_mac,
#   outlook_ios, outlook_android, outlook_web,
#   gmail_web, gmail_ios, gmail_android,
#   apple_mail_macos, apple_mail_ios,
#   yahoo_web, yahoo_ios, yahoo_android,
#   samsung_mail, thunderbird,
#   aol_web, protonmail_web, hey_web, fastmail_web,
