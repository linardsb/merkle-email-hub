<table role="presentation" cellpadding="0" cellspacing="0" width="100%">
  <tr>
    <td style="padding: 16px 32px;" class="dark-bg">
      <table role="presentation" cellpadding="0" cellspacing="0" width="100%" style="border: 1px solid #e0e0e0; border-radius: 4px;">
        <tr>
          <td style="padding: 0;">
            <img data-slot="product_card_image" src="https://placehold.co/536x300" alt="Product image" width="536" style="display: block; width: 100%; height: auto; border: 0; border-radius: 4px 4px 0 0;">
          </td>
        </tr>
        <tr>
          <td style="padding: 16px;">
            <h2 data-slot="product_card_title" style="margin: 0 0 8px; font-size: 20px; line-height: 28px; font-weight: 700; color: #1a1a1a;" class="dark-text">Product Title</h2>
            <p data-slot="product_card_description" style="margin: 0; font-size: 14px; line-height: 22px; color: #666666;" class="dark-text">Product description goes here.</p>
          </td>
        </tr>
      </table>
    </td>
  </tr>
</table>
