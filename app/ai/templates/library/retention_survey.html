<!DOCTYPE html>
<html lang="en" xmlns:v="urn:schemas-microsoft-com:vml" xmlns:o="urn:schemas-microsoft-com:office:office">
<head>
  <meta charset="utf-8">
  <meta name="x-apple-disable-message-reformatting">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="format-detection" content="telephone=no, date=no, address=no, email=no, url=no">
  <meta name="color-scheme" content="light dark">
  <meta name="supported-color-schemes" content="light dark">
  <!--[if mso]>
  <noscript>
    <xml>
      <o:OfficeDocumentSettings xmlns:o="urn:schemas-microsoft-com:office:office">
        <o:PixelsPerInch>96</o:PixelsPerInch>
      </o:OfficeDocumentSettings>
    </xml>
  </noscript>
  <style>
    td,th,div,p,a,h1,h2,h3,h4,h5,h6 {font-family: "Segoe UI", sans-serif; mso-line-height-rule: exactly;}
  </style>
  <![endif]-->
  <title>Share Your Feedback</title>
  <style>
    :root {
      color-scheme: light dark;
      supported-color-schemes: light dark;
    }
    @media (prefers-color-scheme: dark) {
      .dark-bg { background-color: #1a1a2e !important; }
      .dark-text { color: #e5e5e5 !important; }
    }
    [data-ogsc] .dark-bg { background-color: #1a1a2e !important; }
    [data-ogsb] .dark-text { color: #e5e5e5 !important; }
  </style>
</head>
<body style="margin: 0; padding: 0; width: 100%; -webkit-text-size-adjust: 100%;">
  <div role="article" aria-roledescription="email" aria-label="Share Your Feedback" lang="en" style="font-size: 16px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;">
    <!-- Preheader -->
    <div data-slot="preheader" style="display: none; max-height: 0; overflow: hidden; mso-hide: all;">We'd love to hear your thoughts</div>
    <!--[if mso]>
    <table role="presentation" cellpadding="0" cellspacing="0" width="600" align="center"><tr><td>
    <![endif]-->
    <div style="max-width: 600px; margin: 0 auto;">
      <!-- Headline -->
      <table role="presentation" cellpadding="0" cellspacing="0" width="100%">
        <tr>
          <td style="padding: 40px 32px 16px; text-align: center;" class="dark-bg">
            <h1 data-slot="survey_headline" style="margin: 0; font-size: 28px; line-height: 36px; font-weight: 700; color: #1a1a1a;" class="dark-text">How Are We Doing?</h1>
          </td>
        </tr>
      </table>
      <!-- Survey Body -->
      <table role="presentation" cellpadding="0" cellspacing="0" width="100%">
        <tr>
          <td style="padding: 0 32px 24px; text-align: center;" class="dark-bg">
            <p data-slot="survey_body" style="margin: 0; font-size: 16px; line-height: 26px; color: #444444;" class="dark-text">Your feedback helps us improve. Take a moment to let us know about your recent experience. It only takes a minute.</p>
          </td>
        </tr>
      </table>
      <!-- Rating Section -->
      <table role="presentation" cellpadding="0" cellspacing="0" width="100%">
        <tr>
          <td style="padding: 0 32px 24px;" class="dark-bg">
            <p data-slot="rating_label" style="margin: 0 0 16px; font-size: 16px; line-height: 24px; font-weight: 600; color: #1a1a1a; text-align: center;" class="dark-text">Rate your experience</p>
            <table role="presentation" cellpadding="0" cellspacing="0" style="margin: 0 auto;">
              <tr>
                <td style="padding: 0 8px;">
                  <a href="https://example.com/rate/1" style="display: inline-block; width: 48px; height: 48px; line-height: 48px; text-align: center; font-size: 20px; font-weight: 700; color: #ffffff; background-color: #ef5350; border-radius: 50%; text-decoration: none;">1</a>
                </td>
                <td style="padding: 0 8px;">
                  <a href="https://example.com/rate/2" style="display: inline-block; width: 48px; height: 48px; line-height: 48px; text-align: center; font-size: 20px; font-weight: 700; color: #ffffff; background-color: #ff9800; border-radius: 50%; text-decoration: none;">2</a>
                </td>
                <td style="padding: 0 8px;">
                  <a href="https://example.com/rate/3" style="display: inline-block; width: 48px; height: 48px; line-height: 48px; text-align: center; font-size: 20px; font-weight: 700; color: #ffffff; background-color: #ffc107; border-radius: 50%; text-decoration: none;">3</a>
                </td>
                <td style="padding: 0 8px;">
                  <a href="https://example.com/rate/4" style="display: inline-block; width: 48px; height: 48px; line-height: 48px; text-align: center; font-size: 20px; font-weight: 700; color: #ffffff; background-color: #8bc34a; border-radius: 50%; text-decoration: none;">4</a>
                </td>
                <td style="padding: 0 8px;">
                  <a href="https://example.com/rate/5" style="display: inline-block; width: 48px; height: 48px; line-height: 48px; text-align: center; font-size: 20px; font-weight: 700; color: #ffffff; background-color: #4caf50; border-radius: 50%; text-decoration: none;">5</a>
                </td>
              </tr>
            </table>
          </td>
        </tr>
      </table>
      <!-- CTA Button -->
      <table role="presentation" cellpadding="0" cellspacing="0" width="100%">
        <tr>
          <td style="padding: 0 32px 32px; text-align: center;" class="dark-bg">
            <table role="presentation" cellpadding="0" cellspacing="0" style="margin: 0 auto;">
              <tr>
                <td style="border-radius: 4px; background-color: #e84e0f;">
                  <a data-slot="cta_url" href="https://example.com/survey" style="display: inline-block; padding: 14px 32px; font-size: 16px; font-weight: 700; color: #ffffff; text-decoration: none; border-radius: 4px;">
                    <span data-slot="cta_text">Take the Survey</span>
                  </a>
                </td>
              </tr>
            </table>
          </td>
        </tr>
      </table>
      <!-- Footer -->
      <table role="presentation" cellpadding="0" cellspacing="0" width="100%">
        <tr>
          <td style="padding: 24px 32px; text-align: center; font-size: 12px; line-height: 18px; color: #999999;">
            <p style="margin: 0;">You received this email because you signed up.</p>
            <p style="margin: 8px 0 0;"><a href="https://example.com/unsubscribe" style="color: #999999; text-decoration: underline;">Unsubscribe</a> | <a href="https://example.com/preferences" style="color: #999999; text-decoration: underline;">Email Preferences</a></p>
          </td>
        </tr>
      </table>
    </div>
    <!--[if mso]>
    </td></tr></table>
    <![endif]-->
  </div>
</body>
</html>
