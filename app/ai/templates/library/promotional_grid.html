<!DOCTYPE html>
<html lang="en" xmlns:v="urn:schemas-microsoft-com:vml" xmlns:o="urn:schemas-microsoft-com:office:office">
<head>
  <meta charset="utf-8">
  <meta name="x-apple-disable-message-reformatting">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="format-detection" content="telephone=no, date=no, address=no, email=no, url=no">
  <meta name="color-scheme" content="light dark">
  <meta name="supported-color-schemes" content="light dark">
  <!--[if mso]>
  <noscript>
    <xml>
      <o:OfficeDocumentSettings xmlns:o="urn:schemas-microsoft-com:office:office">
        <o:PixelsPerInch>96</o:PixelsPerInch>
      </o:OfficeDocumentSettings>
    </xml>
  </noscript>
  <style>
    td,th,div,p,a,h1,h2,h3,h4,h5,h6 {font-family: "Segoe UI", sans-serif; mso-line-height-rule: exactly;}
  </style>
  <![endif]-->
  <title>Product Collection</title>
  <style>
    :root {
      color-scheme: light dark;
      supported-color-schemes: light dark;
    }
    @media (prefers-color-scheme: dark) {
      .dark-bg { background-color: #1a1a2e !important; }
      .dark-text { color: #e5e5e5 !important; }
    }
    [data-ogsc] .dark-bg { background-color: #1a1a2e !important; }
    [data-ogsb] .dark-text { color: #e5e5e5 !important; }
  </style>
</head>
<body style="margin: 0; padding: 0; width: 100%; -webkit-text-size-adjust: 100%;">
  <div role="article" aria-roledescription="email" aria-label="Product Collection" lang="en" style="font-size: 16px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;">
    <!-- Preheader -->
    <div data-slot="preheader" style="display: none; max-height: 0; overflow: hidden; mso-hide: all;">Browse our latest product collection</div>
    <!--[if mso]>
    <table role="presentation" cellpadding="0" cellspacing="0" width="600" align="center"><tr><td>
    <![endif]-->
    <div style="max-width: 600px; margin: 0 auto;">
      <!-- Headline -->
      <table role="presentation" cellpadding="0" cellspacing="0" width="100%">
        <tr>
          <td style="padding: 32px 32px 24px; text-align: center;" class="dark-bg">
            <h1 style="margin: 0; font-size: 28px; line-height: 36px; font-weight: 700; color: #1a1a1a;" class="dark-text">Our Top Picks</h1>
          </td>
        </tr>
      </table>
      <!-- Product Grid Row 1 -->
      <table role="presentation" cellpadding="0" cellspacing="0" width="100%">
        <tr>
          <td style="padding: 0 32px;" class="dark-bg">
            <!--[if mso]>
            <table role="presentation" cellpadding="0" cellspacing="0" width="536"><tr><td width="258" valign="top">
            <![endif]-->
            <div style="display: inline-block; width: 100%; max-width: 258px; vertical-align: top;">
              <table role="presentation" cellpadding="0" cellspacing="0" width="100%">
                <tr>
                  <td style="padding: 0 10px 24px 0;">
                    <img data-slot="grid_item_1_image" src="https://via.placeholder.com/248x248" alt="Product 1" width="248" height="248" style="display: block; width: 100%; height: auto; border: 0; border-radius: 4px;">
                    <h2 data-slot="grid_item_1_title" style="margin: 12px 0 4px; font-size: 16px; line-height: 22px; font-weight: 700; color: #1a1a1a;" class="dark-text">Product One</h2>
                    <p data-slot="grid_item_1_price" style="margin: 0; font-size: 16px; line-height: 22px; font-weight: 700; color: #e84e0f;">$49.99</p>
                  </td>
                </tr>
              </table>
            </div>
            <!--[if mso]>
            </td><td width="258" valign="top">
            <![endif]-->
            <div style="display: inline-block; width: 100%; max-width: 258px; vertical-align: top;">
              <table role="presentation" cellpadding="0" cellspacing="0" width="100%">
                <tr>
                  <td style="padding: 0 0 24px 10px;">
                    <img data-slot="grid_item_2_image" src="https://via.placeholder.com/248x248" alt="Product 2" width="248" height="248" style="display: block; width: 100%; height: auto; border: 0; border-radius: 4px;">
                    <h2 data-slot="grid_item_2_title" style="margin: 12px 0 4px; font-size: 16px; line-height: 22px; font-weight: 700; color: #1a1a1a;" class="dark-text">Product Two</h2>
                    <p data-slot="grid_item_2_price" style="margin: 0; font-size: 16px; line-height: 22px; font-weight: 700; color: #e84e0f;">$59.99</p>
                  </td>
                </tr>
              </table>
            </div>
            <!--[if mso]>
            </td></tr></table>
            <![endif]-->
          </td>
        </tr>
      </table>
      <!-- Product Grid Row 2 -->
      <table role="presentation" cellpadding="0" cellspacing="0" width="100%">
        <tr>
          <td style="padding: 0 32px;" class="dark-bg">
            <!--[if mso]>
            <table role="presentation" cellpadding="0" cellspacing="0" width="536"><tr><td width="258" valign="top">
            <![endif]-->
            <div style="display: inline-block; width: 100%; max-width: 258px; vertical-align: top;">
              <table role="presentation" cellpadding="0" cellspacing="0" width="100%">
                <tr>
                  <td style="padding: 0 10px 24px 0;">
                    <img data-slot="grid_item_3_image" src="https://via.placeholder.com/248x248" alt="Product 3" width="248" height="248" style="display: block; width: 100%; height: auto; border: 0; border-radius: 4px;">
                    <h2 data-slot="grid_item_3_title" style="margin: 12px 0 4px; font-size: 16px; line-height: 22px; font-weight: 700; color: #1a1a1a;" class="dark-text">Product Three</h2>
                    <p data-slot="grid_item_3_price" style="margin: 0; font-size: 16px; line-height: 22px; font-weight: 700; color: #e84e0f;">$39.99</p>
                  </td>
                </tr>
              </table>
            </div>
            <!--[if mso]>
            </td><td width="258" valign="top">
            <![endif]-->
            <div style="display: inline-block; width: 100%; max-width: 258px; vertical-align: top;">
              <table role="presentation" cellpadding="0" cellspacing="0" width="100%">
                <tr>
                  <td style="padding: 0 0 24px 10px;">
                    <img data-slot="grid_item_4_image" src="https://via.placeholder.com/248x248" alt="Product 4" width="248" height="248" style="display: block; width: 100%; height: auto; border: 0; border-radius: 4px;">
                    <h2 data-slot="grid_item_4_title" style="margin: 12px 0 4px; font-size: 16px; line-height: 22px; font-weight: 700; color: #1a1a1a;" class="dark-text">Product Four</h2>
                    <p data-slot="grid_item_4_price" style="margin: 0; font-size: 16px; line-height: 22px; font-weight: 700; color: #e84e0f;">$69.99</p>
                  </td>
                </tr>
              </table>
            </div>
            <!--[if mso]>
            </td></tr></table>
            <![endif]-->
          </td>
        </tr>
      </table>
      <!-- CTA Button -->
      <table role="presentation" cellpadding="0" cellspacing="0" width="100%">
        <tr>
          <td style="padding: 8px 32px 32px; text-align: center;" class="dark-bg">
            <table role="presentation" cellpadding="0" cellspacing="0" style="margin: 0 auto;">
              <tr>
                <td style="border-radius: 4px; background-color: #e84e0f;">
                  <a data-slot="cta_url" href="https://example.com/shop" style="display: inline-block; padding: 14px 32px; font-size: 16px; font-weight: 700; color: #ffffff; text-decoration: none; border-radius: 4px;">
                    <span data-slot="cta_text">View All Products</span>
                  </a>
                </td>
              </tr>
            </table>
          </td>
        </tr>
      </table>
      <!-- Footer -->
      <table role="presentation" cellpadding="0" cellspacing="0" width="100%">
        <tr>
          <td style="padding: 24px 32px; text-align: center; font-size: 12px; line-height: 18px; color: #999999;">
            <p style="margin: 0;">You received this email because you signed up.</p>
            <p style="margin: 8px 0 0;"><a href="https://example.com/unsubscribe" style="color: #999999; text-decoration: underline;">Unsubscribe</a> | <a href="https://example.com/preferences" style="color: #999999; text-decoration: underline;">Email Preferences</a></p>
          </td>
        </tr>
      </table>
    </div>
    <!--[if mso]>
    </td></tr></table>
    <![endif]-->
  </div>
</body>
</html>
