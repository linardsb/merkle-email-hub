<!DOCTYPE html>
<html lang="en" xmlns:v="urn:schemas-microsoft-com:vml" xmlns:o="urn:schemas-microsoft-com:office:office">
<head>
  <meta charset="utf-8">
  <meta name="x-apple-disable-message-reformatting">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="format-detection" content="telephone=no, date=no, address=no, email=no, url=no">
  <meta name="color-scheme" content="light dark">
  <meta name="supported-color-schemes" content="light dark">
  <!--[if mso]>
  <noscript>
    <xml>
      <o:OfficeDocumentSettings xmlns:o="urn:schemas-microsoft-com:office:office">
        <o:PixelsPerInch>96</o:PixelsPerInch>
      </o:OfficeDocumentSettings>
    </xml>
  </noscript>
  <style>
    td,th,div,p,a,h1,h2,h3,h4,h5,h6 {font-family: "Segoe UI", sans-serif; mso-line-height-rule: exactly;}
  </style>
  <![endif]-->
  <title>Special Offer</title>
  <style>
    :root {
      color-scheme: light dark;
      supported-color-schemes: light dark;
    }
    @media (prefers-color-scheme: dark) {
      .dark-bg { background-color: #1a1a2e !important; }
      .dark-text { color: #e5e5e5 !important; }
    }
    [data-ogsc] .dark-bg { background-color: #1a1a2e !important; }
    [data-ogsb] .dark-text { color: #e5e5e5 !important; }
  </style>
</head>
<body style="margin: 0; padding: 0; width: 100%; -webkit-text-size-adjust: 100%;">
  <div role="article" aria-roledescription="email" aria-label="Special Offer" lang="en" style="font-size: 16px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;">
    <!-- Preheader -->
    <div data-slot="preheader" style="display: none; max-height: 0; overflow: hidden; mso-hide: all;">Check out our latest offer</div>
    <!--[if mso]>
    <table role="presentation" cellpadding="0" cellspacing="0" width="600" align="center"><tr><td>
    <![endif]-->
    <div style="max-width: 600px; margin: 0 auto;">
      <!-- 50/50 Split -->
      <table role="presentation" cellpadding="0" cellspacing="0" width="100%">
        <tr>
          <td style="padding: 0;" class="dark-bg">
            <!--[if mso]>
            <table role="presentation" cellpadding="0" cellspacing="0" width="600"><tr><td width="300" valign="top">
            <![endif]-->
            <div style="display: inline-block; width: 100%; max-width: 300px; vertical-align: top;">
              <table role="presentation" cellpadding="0" cellspacing="0" width="100%">
                <tr>
                  <td style="padding: 0;">
                    <img data-slot="split_image" src="https://via.placeholder.com/300x400" alt="Promotional image" width="300" style="display: block; width: 100%; height: auto; border: 0;">
                  </td>
                </tr>
              </table>
            </div>
            <!--[if mso]>
            </td><td width="300" valign="middle">
            <![endif]-->
            <div style="display: inline-block; width: 100%; max-width: 300px; vertical-align: middle;">
              <table role="presentation" cellpadding="0" cellspacing="0" width="100%">
                <tr>
                  <td style="padding: 32px;">
                    <h1 data-slot="split_headline" style="margin: 0 0 12px; font-size: 24px; line-height: 32px; font-weight: 700; color: #1a1a1a;" class="dark-text">Discover Something New</h1>
                    <p data-slot="split_body" style="margin: 0 0 24px; font-size: 15px; line-height: 24px; color: #444444;" class="dark-text">Explore our curated selection of products designed to elevate your everyday experience.</p>
                    <table role="presentation" cellpadding="0" cellspacing="0">
                      <tr>
                        <td style="border-radius: 4px; background-color: #e84e0f;">
                          <a data-slot="cta_url" href="https://example.com/offer" style="display: inline-block; padding: 14px 32px; font-size: 16px; font-weight: 700; color: #ffffff; text-decoration: none; border-radius: 4px;">
                            <span data-slot="cta_text">Shop Now</span>
                          </a>
                        </td>
                      </tr>
                    </table>
                  </td>
                </tr>
              </table>
            </div>
            <!--[if mso]>
            </td></tr></table>
            <![endif]-->
          </td>
        </tr>
      </table>
      <!-- Footer -->
      <table role="presentation" cellpadding="0" cellspacing="0" width="100%">
        <tr>
          <td style="padding: 24px 32px; text-align: center; font-size: 12px; line-height: 18px; color: #999999;">
            <p style="margin: 0;">You received this email because you signed up.</p>
            <p style="margin: 8px 0 0;"><a href="https://example.com/unsubscribe" style="color: #999999; text-decoration: underline;">Unsubscribe</a> | <a href="https://example.com/preferences" style="color: #999999; text-decoration: underline;">Email Preferences</a></p>
          </td>
        </tr>
      </table>
    </div>
    <!--[if mso]>
    </td></tr></table>
    <![endif]-->
  </div>
</body>
</html>
