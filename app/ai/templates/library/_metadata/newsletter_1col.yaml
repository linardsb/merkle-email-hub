name: newsletter_1col
display_name: "Single-Column Newsletter"
layout_type: newsletter
column_count: 1
has_hero_image: true
has_navigation: false
has_social_links: false
sections:
  - header
  - hero
  - body
  - cta
  - footer
ideal_for:
  - weekly digest
  - blog roundup
  - content newsletter
description: >
  A clean single-column newsletter with hero image, headline, body content,
  and a call-to-action button. Ideal for weekly digests and blog roundups.
slots:
  - slot_id: preheader
    slot_type: preheader
    selector: "[data-slot='preheader']"
    required: false
    max_chars: 100
    placeholder: "Your weekly newsletter is here"
  - slot_id: hero_image
    slot_type: image
    selector: "[data-slot='hero_image']"
    required: false
    max_chars: null
    placeholder: "https://via.placeholder.com/600x300"
  - slot_id: hero_headline
    slot_type: headline
    selector: "[data-slot='hero_headline']"
    required: true
    max_chars: 80
    placeholder: "Your Weekly Newsletter Headline"
  - slot_id: body_content
    slot_type: body
    selector: "[data-slot='body_content']"
    required: true
    max_chars: 2000
    placeholder: "Newsletter body content goes here"
  - slot_id: cta_url
    slot_type: cta
    selector: "[data-slot='cta_url']"
    required: false
    max_chars: null
    placeholder: "https://example.com"
  - slot_id: cta_text
    slot_type: cta
    selector: "[data-slot='cta_text']"
    required: false
    max_chars: 30
    placeholder: "Read More"

default_tokens:
  colors:
    cta: "#e84e0f"
    heading: "#1a1a1a"
    body: "#444444"
    subheadline: "#666666"
    muted: "#999999"
    background: "#ffffff"
    cta_text: "#ffffff"
    dark_background: "#1a1a2e"
    dark_text: "#e5e5e5"
  fonts:
    body: "-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
    mso: "\"Segoe UI\", sans-serif"
  font_sizes:
    base: "16px"
    heading: "28px"
  spacing:
    border_radius: "4px"
