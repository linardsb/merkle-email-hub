name: transactional_welcome
display_name: "Welcome Email"
layout_type: transactional
column_count: 1
has_hero_image: true
has_navigation: false
has_social_links: false
sections:
  - header
  - hero
  - body
  - cta
  - footer
ideal_for:
  - welcome email
  - onboarding
  - account creation
description: >
  A welcoming onboarding template with hero image, greeting, three getting-started
  steps, and a call-to-action. Ideal for welcome emails and new account setup.
slots:
  - slot_id: preheader
    slot_type: preheader
    selector: "[data-slot='preheader']"
    required: false
    max_chars: 100
    placeholder: "Welcome aboard! Here's how to get started"
  - slot_id: hero_image
    slot_type: image
    selector: "[data-slot='hero_image']"
    required: false
    max_chars: null
    placeholder: "https://via.placeholder.com/600x250"
  - slot_id: welcome_headline
    slot_type: headline
    selector: "[data-slot='welcome_headline']"
    required: true
    max_chars: 80
    placeholder: "Welcome to Our Community"
  - slot_id: welcome_body
    slot_type: body
    selector: "[data-slot='welcome_body']"
    required: true
    max_chars: 2000
    placeholder: "We're thrilled to have you join us."
  - slot_id: step_1
    slot_type: body
    selector: "[data-slot='step_1']"
    required: true
    max_chars: 200
    placeholder: "Complete your profile to personalize your experience."
  - slot_id: step_2
    slot_type: body
    selector: "[data-slot='step_2']"
    required: true
    max_chars: 200
    placeholder: "Explore our feature set and discover tools."
  - slot_id: step_3
    slot_type: body
    selector: "[data-slot='step_3']"
    required: true
    max_chars: 200
    placeholder: "Connect with our community to share ideas."
  - slot_id: cta_url
    slot_type: cta
    selector: "[data-slot='cta_url']"
    required: true
    max_chars: null
    placeholder: "https://example.com/get-started"
  - slot_id: cta_text
    slot_type: cta
    selector: "[data-slot='cta_text']"
    required: true
    max_chars: 30
    placeholder: "Get Started"
