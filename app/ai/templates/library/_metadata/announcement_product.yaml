name: announcement_product
display_name: "Product Announcement"
layout_type: announcement
column_count: 1
has_hero_image: true
has_navigation: false
has_social_links: false
sections:
  - header
  - hero
  - body
  - cta
  - footer
ideal_for:
  - product announcement
  - feature launch
  - release notes
description: >
  A product announcement template with hero image, product name, description,
  three feature highlights, and a CTA. Ideal for launches and release notes.
slots:
  - slot_id: preheader
    slot_type: preheader
    selector: "[data-slot='preheader']"
    required: false
    max_chars: 100
    placeholder: "Introducing our latest product"
  - slot_id: hero_image
    slot_type: image
    selector: "[data-slot='hero_image']"
    required: false
    max_chars: null
    placeholder: "https://via.placeholder.com/600x350"
  - slot_id: product_name
    slot_type: headline
    selector: "[data-slot='product_name']"
    required: true
    max_chars: 80
    placeholder: "Introducing Product X"
  - slot_id: product_description
    slot_type: body
    selector: "[data-slot='product_description']"
    required: true
    max_chars: 2000
    placeholder: "The next generation of innovation."
  - slot_id: feature_1
    slot_type: body
    selector: "[data-slot='feature_1']"
    required: true
    max_chars: 200
    placeholder: "Lightning Fast — Experience speeds up to 10x faster."
  - slot_id: feature_2
    slot_type: body
    selector: "[data-slot='feature_2']"
    required: true
    max_chars: 200
    placeholder: "Smart Integration — Seamlessly connects with your tools."
  - slot_id: feature_3
    slot_type: body
    selector: "[data-slot='feature_3']"
    required: true
    max_chars: 200
    placeholder: "Advanced Security — Enterprise-grade data protection."
  - slot_id: cta_url
    slot_type: cta
    selector: "[data-slot='cta_url']"
    required: true
    max_chars: null
    placeholder: "https://example.com/product"
  - slot_id: cta_text
    slot_type: cta
    selector: "[data-slot='cta_text']"
    required: true
    max_chars: 30
    placeholder: "Learn More"
