name: retention_survey
display_name: "Feedback Survey"
layout_type: retention
column_count: 1
has_hero_image: false
has_navigation: false
has_social_links: false
sections:
  - header
  - body
  - cta
  - footer
ideal_for:
  - feedback request
  - NPS survey
  - satisfaction poll
description: >
  A feedback survey template with headline, explanatory body, rating label,
  and a survey CTA button. Ideal for NPS surveys and satisfaction polls.
slots:
  - slot_id: preheader
    slot_type: preheader
    selector: "[data-slot='preheader']"
    required: false
    max_chars: 100
    placeholder: "We'd love to hear your thoughts"
  - slot_id: survey_headline
    slot_type: headline
    selector: "[data-slot='survey_headline']"
    required: true
    max_chars: 80
    placeholder: "How Are We Doing?"
  - slot_id: survey_body
    slot_type: body
    selector: "[data-slot='survey_body']"
    required: true
    max_chars: 2000
    placeholder: "Your feedback helps us improve. Take a moment to let us know about your experience."
  - slot_id: rating_label
    slot_type: body
    selector: "[data-slot='rating_label']"
    required: false
    max_chars: 100
    placeholder: "Rate your experience"
  - slot_id: cta_url
    slot_type: cta
    selector: "[data-slot='cta_url']"
    required: true
    max_chars: null
    placeholder: "https://example.com/survey"
  - slot_id: cta_text
    slot_type: cta
    selector: "[data-slot='cta_text']"
    required: true
    max_chars: 30
    placeholder: "Take the Survey"
