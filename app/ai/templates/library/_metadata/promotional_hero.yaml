name: promotional_hero
display_name: "Promotional Hero"
layout_type: promotional
column_count: 1
has_hero_image: true
has_navigation: false
has_social_links: false
sections:
  - header
  - hero
  - body
  - cta
  - footer
ideal_for:
  - product launch
  - sale
  - single-product campaign
description: >
  A bold promotional template with a full-width hero image, headline,
  subheadline, and body content. Perfect for product launches and sales.
slots:
  - slot_id: preheader
    slot_type: preheader
    selector: "[data-slot='preheader']"
    required: false
    max_chars: 100
    placeholder: "Don't miss this exclusive offer"
  - slot_id: hero_image
    slot_type: image
    selector: "[data-slot='hero_image']"
    required: true
    max_chars: null
    placeholder: "https://via.placeholder.com/600x400"
  - slot_id: hero_headline
    slot_type: headline
    selector: "[data-slot='hero_headline']"
    required: true
    max_chars: 80
    placeholder: "Exclusive Offer Just for You"
  - slot_id: hero_subheadline
    slot_type: subheadline
    selector: "[data-slot='hero_subheadline']"
    required: false
    max_chars: 120
    placeholder: "Limited time only — act now before it's gone"
  - slot_id: body_content
    slot_type: body
    selector: "[data-slot='body_content']"
    required: false
    max_chars: 2000
    placeholder: "Promotional body content goes here"
  - slot_id: cta_url
    slot_type: cta
    selector: "[data-slot='cta_url']"
    required: true
    max_chars: null
    placeholder: "https://example.com/offer"
  - slot_id: cta_text
    slot_type: cta
    selector: "[data-slot='cta_text']"
    required: true
    max_chars: 30
    placeholder: "Shop Now"
