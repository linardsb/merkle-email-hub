# Email Accessibility Rules — WCAG AA
# Source: docs/email-accessibility-wcag-aa.md
# Used by: app/qa_engine/checks/accessibility.py
# Also indexed in RAG knowledge base via: make seed-knowledge

rules:
  # ─── Group A: Language ───

  - id: "a11y-lang-present"
    group: "language"
    wcag: "3.1.1"
    level: "A"
    name: "lang attribute on <html>"
    check: "attr_present"
    selector: "html"
    attr: "lang"
    deduction_key: "deduction_lang_missing"
    default_deduction: 0.15
    message: "Missing lang attribute on <html> — screen readers cannot determine pronunciation language"

  - id: "a11y-lang-valid"
    group: "language"
    wcag: "3.1.1"
    level: "A"
    name: "Valid BCP-47 language code"
    check: "attr_pattern"
    selector: "html"
    attr: "lang"
    patterns: ["^[a-zA-Z]{2,3}(-[a-zA-Z0-9]{2,8})*$"]
    deduction_key: "deduction_lang_invalid"
    default_deduction: 0.10
    message: "Invalid lang value — use BCP-47 format (e.g. 'en', 'en-US', 'zh-Hans')"

  # ─── Group B: Table Semantics ───

  - id: "a11y-layout-table-role"
    group: "tables"
    wcag: "1.3.1"
    level: "A"
    name: "Layout tables need role=presentation"
    check: "custom"
    custom_fn: "layout_table_heuristic"
    deduction_key: "deduction_table_no_role"
    default_deduction: 0.10
    per_element: true
    cap_key: "max_table_issues_reported"
    default_cap: 5
    message: "Layout table missing role='presentation' — screen readers announce table structure to users"

  - id: "a11y-table-mixed-signals"
    group: "tables"
    wcag: "1.3.1"
    level: "A"
    name: "No data-table signals on layout tables"
    check: "custom"
    custom_fn: "table_mixed_signals"
    deduction_key: "deduction_table_mixed_signals"
    default_deduction: 0.10
    cap_key: "max_table_issues_reported"
    default_cap: 5
    message: "Table with role='presentation' contains data-table signals (<th>, <caption>, summary) — conflicting semantics confuse screen readers"

  - id: "a11y-data-table-headers"
    group: "tables"
    wcag: "1.3.1"
    level: "A"
    name: "Data table headers have scope"
    check: "custom"
    custom_fn: "data_table_headers"
    deduction_key: "deduction_data_table_no_headers"
    default_deduction: 0.10
    message: "Data table <th> missing scope='col' or scope='row' — screen readers cannot associate cells with headers"

  # ─── Group C: Image Accessibility ───

  - id: "a11y-img-alt"
    group: "images"
    wcag: "1.1.1"
    level: "A"
    name: "Images have alt attribute"
    check: "custom"
    custom_fn: "img_alt_present"
    deduction_key: "deduction_img_no_alt"
    default_deduction: 0.10
    per_element: true
    cap_key: "max_img_issues_reported"
    default_cap: 5
    message: "<img> missing alt attribute — screen readers announce file name instead"

  - id: "a11y-tracking-pixel-alt"
    group: "images"
    wcag: "1.1.1"
    level: "A"
    name: "Tracking pixels have empty alt"
    check: "custom"
    custom_fn: "tracking_pixel_alt"
    deduction_key: "deduction_tracking_pixel_alt"
    default_deduction: 0.05
    per_element: true
    cap_key: "max_img_issues_reported"
    default_cap: 5
    message: "Tracking pixel/spacer image must have alt='' (empty) — screen readers should not announce these"

  - id: "a11y-linked-img-alt"
    group: "images"
    wcag: "2.4.4"
    level: "A"
    name: "Linked images have descriptive alt"
    check: "custom"
    custom_fn: "linked_img_alt"
    deduction_key: "deduction_linked_img_no_alt"
    default_deduction: 0.10
    per_element: true
    cap_key: "max_img_issues_reported"
    default_cap: 5
    message: "Linked image with empty/missing alt — the link has no accessible name for screen readers"

  # ─── Group D: Heading Hierarchy ───

  - id: "a11y-headings-present"
    group: "headings"
    wcag: "2.4.6"
    level: "AA"
    name: "Email has heading elements"
    check: "custom"
    custom_fn: "headings_present"
    deduction_key: "deduction_no_headings"
    default_deduction: 0.10
    message: "No heading elements (h1-h6) found — screen reader users cannot navigate by heading"

  - id: "a11y-multiple-h1"
    group: "headings"
    wcag: "2.4.6"
    level: "AA"
    name: "Single <h1> element"
    check: "element_count"
    selector: "h1"
    min_count: 0
    max_count: 1
    deduction_key: "deduction_multiple_h1"
    default_deduction: 0.10
    message: "Multiple <h1> elements — email should have a single primary heading"

  - id: "a11y-heading-hierarchy"
    group: "headings"
    wcag: "1.3.1"
    level: "A"
    name: "No skipped heading levels"
    check: "custom"
    custom_fn: "heading_hierarchy"
    deduction_key: "deduction_skipped_heading"
    default_deduction: 0.10
    per_element: true
    cap_key: "max_heading_issues_reported"
    default_cap: 5
    message: "Skipped heading level — headings must follow logical descending hierarchy (h1 > h2 > h3)"

  # ─── Group E: Link Accessibility ───

  - id: "a11y-generic-link-text"
    group: "links"
    wcag: "2.4.4"
    level: "A"
    name: "No generic link text"
    check: "custom"
    custom_fn: "generic_link_text"
    deduction_key: "deduction_generic_link_text"
    default_deduction: 0.08
    per_element: true
    cap_key: "max_link_issues_reported"
    default_cap: 5
    message: "Generic link text — use descriptive text instead of 'click here', 'read more', etc."

  - id: "a11y-empty-links"
    group: "links"
    wcag: "2.4.4"
    level: "A"
    name: "No empty links"
    check: "custom"
    custom_fn: "empty_links"
    deduction_key: "deduction_empty_link"
    default_deduction: 0.10
    per_element: true
    cap_key: "max_link_issues_reported"
    default_cap: 5
    message: "Empty link — no text content, aria-label, or image alt to serve as accessible name"

  - id: "a11y-redundant-links"
    group: "links"
    wcag: "best-practice"
    level: ""
    name: "No redundant adjacent links"
    check: "custom"
    custom_fn: "redundant_links"
    deduction_key: "deduction_redundant_links"
    default_deduction: 0.05
    per_element: true
    cap_key: "max_link_issues_reported"
    default_cap: 5
    message: "Redundant adjacent links to same URL — wrap image and text in a single <a> tag"

  # ─── Group F: Content Semantics & Screen Reader ───

  - id: "a11y-semantic-emphasis"
    group: "content"
    wcag: "1.3.1"
    level: "A"
    name: "Use <strong>/<em> not <b>/<i>"
    check: "custom"
    custom_fn: "semantic_emphasis"
    deduction_key: "deduction_non_semantic_emphasis"
    default_deduction: 0.05
    message: "<b>/<i> tags found — use <strong>/<em> for semantic emphasis that screen readers can announce"

  - id: "a11y-preview-padding-aria"
    group: "content"
    wcag: "best-practice"
    level: ""
    name: "Preview padding hidden from screen readers"
    check: "custom"
    custom_fn: "preview_padding_aria"
    deduction_key: "deduction_preview_padding_no_aria"
    default_deduction: 0.08
    message: "Preview text padding (repeated &zwnj;/&nbsp;) without aria-hidden='true' — screen readers announce dozens of blank characters"

  - id: "a11y-spacer-aria"
    group: "content"
    wcag: "best-practice"
    level: ""
    name: "Spacer cells/images hidden from screen readers"
    check: "custom"
    custom_fn: "spacer_aria"
    deduction_key: "deduction_spacer_no_aria"
    default_deduction: 0.05
    per_element: true
    cap_key: "max_content_issues_reported"
    default_cap: 5
    message: "Spacer cell/image without aria-hidden='true' — screen readers announce 'space' for each one"

  - id: "a11y-separator-aria"
    group: "content"
    wcag: "best-practice"
    level: ""
    name: "Separator characters hidden from screen readers"
    check: "custom"
    custom_fn: "separator_aria"
    deduction_key: "deduction_separator_no_aria"
    default_deduction: 0.05
    per_element: true
    cap_key: "max_content_issues_reported"
    default_cap: 5
    message: "Separator character (|, bullet, dash) without aria-hidden='true' — screen readers announce 'vertical bar', 'bullet' etc."

  - id: "a11y-outline-removal"
    group: "content"
    wcag: "2.4.7"
    level: "AA"
    name: "No outline removal without replacement"
    check: "custom"
    custom_fn: "outline_removal"
    deduction_key: "deduction_outline_removed"
    default_deduction: 0.10
    message: "outline:none/outline:0 found — removes visible focus indicator for keyboard users"

  - id: "a11y-consecutive-br"
    group: "content"
    wcag: "1.3.1"
    level: "A"
    name: "No consecutive <br> for spacing"
    check: "custom"
    custom_fn: "consecutive_br"
    deduction_key: "deduction_br_spacing"
    default_deduction: 0.05
    message: "Consecutive <br> used for spacing — use <p> or table cell padding for proper semantic separation"

  # ─── Group G: Dark Mode Contrast ───

  - id: "a11y-dark-unsafe-colors"
    group: "dark_mode"
    wcag: "1.4.3"
    level: "AA"
    name: "No unsafe pure black/white in dark mode"
    check: "custom"
    custom_fn: "dark_unsafe_colors"
    deduction_key: "deduction_dark_unsafe_colors"
    default_deduction: 0.08
    message: "Dark mode styles use pure #ffffff/#000000 pairs — these invert unpredictably across email clients; use #f0f0f0 on #1a1a1a instead"

  - id: "a11y-dark-no-overrides"
    group: "dark_mode"
    wcag: "1.4.3"
    level: "AA"
    name: "Dark mode meta has matching styles"
    check: "custom"
    custom_fn: "dark_no_overrides"
    deduction_key: "deduction_dark_no_overrides"
    default_deduction: 0.10
    message: "color-scheme meta declared but no @media (prefers-color-scheme: dark) styles — clients will force-invert unpredictably"

  # ─── Group H: AMP Form Accessibility ───

  - id: "a11y-input-label"
    group: "forms"
    wcag: "3.3.2"
    level: "A"
    name: "Form inputs have associated labels"
    check: "custom"
    custom_fn: "input_label"
    deduction_key: "deduction_input_no_label"
    default_deduction: 0.10
    per_element: true
    cap_key: "max_form_issues_reported"
    default_cap: 5
    message: "Form input without associated <label> — placeholder alone is insufficient for accessibility"

  - id: "a11y-required-aria"
    group: "forms"
    wcag: "3.3.2"
    level: "A"
    name: "Required fields have aria-required"
    check: "custom"
    custom_fn: "required_aria"
    deduction_key: "deduction_required_no_aria"
    default_deduction: 0.08
    per_element: true
    cap_key: "max_form_issues_reported"
    default_cap: 5
    message: "Required field missing aria-required='true' — screen readers cannot indicate required status"
