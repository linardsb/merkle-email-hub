# Spam Trigger Database — weighted phrases with categories
# Source: SpamAssassin rules, Mailchimp/Braze spam filter guidance
# Used by: app/qa_engine/checks/spam_score.py via custom_checks.py
#
# Each trigger has:
#   phrase: case-insensitive word-boundary match
#   weight: deduction amount (0.05 = minor, 0.30 = critical)
#   category: urgency | money | action | clickbait | legal | deceptive | excessive

triggers:
  # ─── Urgency (pressure tactics) ───
  - phrase: "act now"
    weight: 0.15
    category: urgency
  - phrase: "limited time"
    weight: 0.10
    category: urgency
  - phrase: "hurry"
    weight: 0.10
    category: urgency
  - phrase: "expires"
    weight: 0.05
    category: urgency
  - phrase: "urgent"
    weight: 0.15
    category: urgency
  - phrase: "don't delay"
    weight: 0.10
    category: urgency
  - phrase: "don't miss"
    weight: 0.05
    category: urgency
  - phrase: "last chance"
    weight: 0.10
    category: urgency
  - phrase: "only today"
    weight: 0.10
    category: urgency
  - phrase: "time is running out"
    weight: 0.10
    category: urgency
  - phrase: "before it's too late"
    weight: 0.10
    category: urgency
  - phrase: "ending soon"
    weight: 0.05
    category: urgency

  # ─── Money (financial promises) ───
