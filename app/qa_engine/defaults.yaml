# Default QA check configuration.
# Per-project overrides stored in projects.qa_profile JSON column.

html_validation:
  enabled: true
  severity: error
  threshold: 0.5
  params:
    # Group A: Document Skeleton
    deduction_doctype: 0.15
    deduction_structure: 0.15
    deduction_charset: 0.15
    deduction_viewport: 0.10
    deduction_title: 0.10
    # Group B: Tag Integrity
    deduction_unclosed_tag: 0.15
    deduction_nesting: 0.10
    deduction_duplicate_id: 0.10
    # Group C: Content Integrity
    deduction_empty_section: 0.15
    deduction_style_placement: 0.10
    # Group D: Email-Specific Structure
    deduction_table_structure: 0.15
    deduction_list_structure: 0.10
    deduction_duplicate_structural: 0.15
    deduction_nested_link: 0.15
    # Group E: Progressive Enhancement
    deduction_missing_fallback: 0.10
    deduction_interactive_structure: 0.10
    deduction_dangerous_element: 0.15
    # Reporting caps
    max_unclosed_tags_reported: 5
    max_nesting_violations_reported: 5
    max_duplicate_ids_reported: 5
    max_table_violations_reported: 5
    max_list_violations_reported: 5

css_support:
  enabled: true
  severity: warning
  threshold: 0.5
  params:
    error_deduction: 0.2
    warning_deduction: 0.1
    max_issues_in_details: 10
    # Syntax validation params
    deduction_syntax_error: 0.15
    deduction_empty_declaration: 0.05
    deduction_vendor_prefix: 0.05
    deduction_external_stylesheet: 0.25
    deduction_import_rule: 0.20
    deduction_important_overuse: 0.10
    deduction_non_inline: 0.10
    max_syntax_errors_reported: 5
    max_empty_declarations_reported: 5
    max_vendor_prefixes_reported: 5
    max_non_inline_reported: 5
    important_threshold: 10

file_size:
  enabled: true
  severity: error
  threshold: 0.5
  params:
    # Group A: Client thresholds (KB)
    gmail_threshold_kb: 102
    outlook_threshold_kb: 100
    yahoo_threshold_kb: 75
    braze_threshold_kb: 100
    # Group A: Deductions
    deduction_gmail_clip: 0.30
    deduction_outlook_perf: 0.20
    deduction_yahoo_clip: 0.10
    deduction_braze_limit: 0.15
    # Group B: Content distribution
    inline_css_max_pct: 40
    mso_conditional_max_pct: 25
    deduction_inline_css_bloat: 0.05
    deduction_mso_bloat: 0.05
    # Group C: Compression
    gzip_min_reduction_pct: 50
    deduction_poor_gzip: 0.05
    # Group D: Summary (no deduction)
    deduction_size_summary: 0.0

link_validation:
  enabled: true
  severity: warning
  threshold: 0.5
  params:
    deduction_per_issue: 0.1
    allowed_protocols:
      - https
      - http
      - mailto
      - tel

spam_score:
  enabled: true
  severity: warning
  threshold: 0.5
  params:
    # Group A: Trigger scan (deductions come from per-trigger weights in data/spam_triggers.yaml)
    max_triggers_reported: 10
    # Group B: Subject line
    subject_weight_multiplier: 3.0
    # Group C: Formatting heuristics
    deduction_excessive_punctuation: 0.10
    deduction_all_caps: 0.10
    deduction_obfuscation: 0.15

dark_mode:
  enabled: true
  severity: warning
  threshold: 0.5
  params:
    deduction_per_issue: 0.33

accessibility:
  enabled: true
  severity: warning
  threshold: 0.5
  params:
    # Group A: Language
    deduction_lang_missing: 0.15
    deduction_lang_invalid: 0.10
    # Group B: Table Semantics
    deduction_table_no_role: 0.10
    deduction_table_mixed_signals: 0.10
    deduction_data_table_no_headers: 0.10
    # Group C: Image Accessibility
    deduction_img_no_alt: 0.10
    deduction_tracking_pixel_alt: 0.05
    deduction_linked_img_no_alt: 0.10
    # Group D: Heading Hierarchy
    deduction_no_headings: 0.10
    deduction_multiple_h1: 0.10
    deduction_skipped_heading: 0.10
    # Group E: Link Accessibility
    deduction_generic_link_text: 0.08
    deduction_empty_link: 0.10
    deduction_redundant_links: 0.05
    # Group F: Content Semantics & Screen Reader
    deduction_non_semantic_emphasis: 0.05
    deduction_preview_padding_no_aria: 0.08
    deduction_spacer_no_aria: 0.05
    deduction_separator_no_aria: 0.05
    deduction_outline_removed: 0.10
    deduction_br_spacing: 0.05
    # Group G: Dark Mode Contrast
    deduction_dark_unsafe_colors: 0.08
    deduction_dark_no_overrides: 0.10
    # Group H: AMP Form Accessibility
    deduction_input_no_label: 0.10
    deduction_required_no_aria: 0.08
    # Reporting caps
    max_table_issues_reported: 5
    max_img_issues_reported: 5
    max_heading_issues_reported: 5
    max_link_issues_reported: 5
    max_content_issues_reported: 5
    max_form_issues_reported: 5

fallback:
  enabled: true
  severity: warning
  threshold: 0.5
  params:
    deduction_per_issue: 0.4

image_optimization:
  enabled: true
  severity: warning
  threshold: 0.5
  params:
    # Group A: Core attributes
    deduction_missing_dimensions: 0.05
    deduction_missing_alt: 0.05
    deduction_empty_src: 0.10
    # Group B: Format validation
    deduction_banned_format: 0.10
    deduction_data_uri_oversize: 0.10
    data_uri_max_bytes: 3072          # 3KB threshold
    # Group C: Dimension integrity
    deduction_invalid_dimension: 0.03
    # Group D: Tracking pixels
    deduction_tracking_pixel: 0.03
    # Group E: Rendering practices
    deduction_missing_border: 0.03
    deduction_missing_display_block: 0.02
    # Group F: Summary (no deduction)
    deduction_img_summary: 0.0
    # Reporting caps
    max_dimension_issues_reported: 5
    max_alt_issues_reported: 5
    max_src_issues_reported: 3
    max_format_issues_reported: 3
    max_data_uri_issues_reported: 3
    max_tracking_issues_reported: 3
    max_border_issues_reported: 5
    max_display_issues_reported: 5

brand_compliance:
  enabled: true
  severity: warning
  threshold: 0.5
  params:
    # Brand rules — set per-project via qa_profile JSON column
    # When empty, check passes with info message (backward-compatible)
    allowed_colors: []           # e.g. ["#ff0000", "#003366", "#ffffff"]
    required_fonts: []           # e.g. ["arial", "helvetica"]
    required_elements: []        # e.g. ["footer", "logo", "unsubscribe"]
    forbidden_patterns: []       # e.g. ["click here", "buy now"]
    # Deductions
    deduction_off_brand_color: 0.20
    deduction_wrong_font: 0.15
    deduction_missing_footer: 0.25
    deduction_missing_logo: 0.25
    deduction_missing_unsubscribe: 0.25
    deduction_forbidden_pattern: 0.20
    # Reporting caps
    max_color_issues_reported: 10
    max_font_issues_reported: 5
    max_pattern_issues_reported: 5

personalisation_syntax:
  enabled: true
  severity: warning
  threshold: 0.5
  params:
    # Group A: Platform Detection
    deduction_mixed_platform: 0.30
    deduction_unknown_platform: 0.10
    # Group B: Delimiter Balance
    deduction_delimiter_unbalanced: 0.15
    deduction_conditional_unbalanced: 0.15
    max_delimiter_issues: 5
    max_conditional_issues: 5
    # Group C: Fallback Completeness
    deduction_fallback_missing: 0.05
    deduction_fallback_empty: 0.03
    max_fallback_issues: 10
    max_fallback_empty_issues: 5
    # Group D: Syntax Correctness
    deduction_syntax_error: 0.10
    max_syntax_issues: 5
    # Group E: Best Practices
    deduction_nesting_depth: 0.03
    max_nesting_issues: 3
    max_nesting_depth: 3
    # Group F: Summary
    deduction_summary: 0.0
