  - slug: heading
    name: Heading
    description: "Large heading text block (24px) with left-aligned bold title."
    category: content
    compatibility: full

  - slug: hero-2cta
    name: Hero 2-CTA
    description: "Hero image banner with desktop/mobile image swap and two CTA buttons."
