  # ── Converter (slugs emitted by the design-sync matcher) ─
  - slug: email-header
    name: Email Header
    description: "Logo + navigation links header with MSO conditional wrapper."
    category: structure
    compatibility: full

  - slug: email-footer
    name: Email Footer
    description: "Copyright, address, unsubscribe/preferences links with MSO wrapper."
    category: structure
    compatibility: full
    slot_definitions:
      - slot_id: footer_content
        slot_type: body
        selector: "[data-slot='footer_content']"
        required: false

  - slug: cta-button
    name: CTA Button
    description: "Centered CTA button with VML roundrect fallback for Outlook."
    category: action
    compatibility: full
    slot_definitions:
      - slot_id: cta_url
        slot_type: cta
        selector: "[data-slot='cta_url']"
        required: true
      - slot_id: cta_text
        slot_type: body
        selector: "[data-slot='cta_text']"
        required: true
    default_tokens:
      colors:
        cta: "#0066cc"
        cta_text: "#ffffff"
        dark_cta: "#4895ef"
      spacing:
        padding_v: "12px"
        padding_h: "32px"

  - slug: hero-block
    name: Hero Block
    description: "VML background image hero with headline, subtext, and CTA overlay."
    category: content
    compatibility: full
    slot_definitions:
      - slot_id: hero_image
        slot_type: image
        selector: "table[style*='background-image']"
        required: true
      - slot_id: headline
        slot_type: headline
        selector: "[data-slot='headline']"
        required: true
      - slot_id: subtext
        slot_type: body
        selector: "[data-slot='subtext']"
        required: false
      - slot_id: cta_url
        slot_type: cta
        selector: "[data-slot='cta_url']"
        required: false
      - slot_id: cta_text
        slot_type: body
        selector: "[data-slot='cta_text']"
        required: false
    default_tokens:
      colors:
        headline: "#ffffff"
        subtext: "#e0e0e0"
        cta: "#ffffff"
        cta_text: "#333333"
        overlay: "rgba(0,0,0,0.4)"
      fonts:
        headline: "Arial, sans-serif"
        body: "Arial, sans-serif"
      font_sizes:
        headline: "32px"
        subtext: "16px"

  - slug: product-card
    name: Product Card
    description: "Product image with title, price, description, and CTA in a bordered card."
    category: content
    compatibility: full

  - slug: spacer
    name: Spacer
