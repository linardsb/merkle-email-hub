    description: "Bare empty td cell snippet for structural use."
    category: structure
    compatibility: full

  # ── Interactive ─────────────────────────────────────────
  - slug: accordion
    name: Accordion
    description: "CSS-only expandable accordion using checkbox hack. Limited client support."
