# Component manifest — metadata for file-based email components.
# HTML is loaded from email-templates/components/{slug}.html at runtime.
# Slots and tokens can be added incrementally per component.

html_dir: email-templates/components

components:
  # ── Action ──────────────────────────────────────────────
  - slug: button
    name: Button
    description: "Single CTA button with rounded corners and filled background."
    category: action
    compatibility: full

  - slug: button-filled
    name: Button Filled
    description: "Filled button with solid background, rounded corners, and uppercase text."
    category: action
    compatibility: full

  - slug: button-ghost
    name: Button Ghost
    description: "Outline-only ghost button with transparent background and border."
    category: action
    compatibility: full

  - slug: button-responsive
    name: Button Responsive
    description: "Filled button with rounded corners and responsive width scaling."
    category: action
    compatibility: full

  - slug: cta
    name: CTA
    description: "Call-to-action section with left-aligned button in a padded container."
    category: action
    compatibility: full

  - slug: cta-pair
    name: CTA Pair
    description: "Two side-by-side CTA buttons in a padded container."
    category: action
    compatibility: full

  # ── Content ─────────────────────────────────────────────
  - slug: article-2
    name: Article 2-Column
    description: "Two-column article with image and text side by side (300px columns)."
