  - slug: hero-text
    name: Hero Text
    description: "Hero image banner with desktop/mobile image swap and text overlay below."
    category: content
    compatibility: partial_samsung

  - slug: icon
    name: Icon
    description: "Icon + text row with small image (35px) beside descriptive content."
    category: content
    compatibility: full

  - slug: image
    name: Image
    description: "Simple inline image tag with configurable src, alt, width, and height."
    category: content
    compatibility: full

  - slug: image-responsive
    name: Image Responsive
    description: "Responsive image that scales to container width via responsive class."
    category: content
    compatibility: full

  - slug: list
    name: List
    description: "Bulleted list using table rows with colored bullet characters."
    category: content
    compatibility: full

  - slug: paragraph
