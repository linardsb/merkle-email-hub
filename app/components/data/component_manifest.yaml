  - slug: carousel
    name: Carousel
    description: "CSS-animated image carousel with non-WebKit fallback."
    category: interactive
    compatibility: partial_interactive

  - slug: carousel-animated
    name: Carousel Animated
    description: "Slide-effect animated carousel with Samsung/Comcast client detection."
