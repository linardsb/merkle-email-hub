    compatibility: full

  - slug: editorial-2
    name: Editorial 2
    description: "Two-column editorial block with colored background and image + text."
    category: content
    compatibility: full

  - slug: editorial-3
    name: Editorial 3
    description: "Two-column editorial with accent background, image right, text left."
    category: content
    compatibility: full

  - slug: editorial-4
    name: Editorial 4
    description: "Two-column editorial with nested colored backgrounds and reversed layout."
