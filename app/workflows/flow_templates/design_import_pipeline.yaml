id: design-import-pipeline
namespace: merkle-email-hub
description: "Design import: sync → brief generation → build → QA → approval"

inputs:
  - id: figma_file_ref
    type: STRING
    required: true
  - id: project_id
    type: INT
    required: true

tasks:
  - id: build
    type: hub.blueprint_run
    inputs:
      brief: "Build email from imported design"
      blueprint_name: "full_pipeline"
      project_id: "{{ inputs.project_id }}"
    retry:
      maxAttempt: 3
      type: constant
      interval: PT30S

  - id: qa
    type: hub.qa_check
    inputs:
      html: "{{ outputs.build.html }}"
      project_id: "{{ inputs.project_id }}"

  - id: approval
    type: hub.approval_gate
    inputs:
      project_id: "{{ inputs.project_id }}"
      approver_role: "admin"
