# Promtail configuration for local development
# Scrapes Docker container logs and parses structlog JSON
# Docs: https://grafana.com/docs/loki/latest/send-data/promtail/configuration/

server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: warn

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      # Keep only containers from the merkle-email-hub project
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: container_name
      - source_labels: ['__meta_docker_container_name']
        regex: '/.*'
        action: keep
      # Extract compose service name
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: service
      # Extract compose project name
      - source_labels: ['__meta_docker_container_label_com_docker_compose_project']
        target_label: project

    pipeline_stages:
      # Parse Docker JSON log format
      - docker: {}

      # Try to parse structlog JSON (app, mock-esp emit JSON)
      # Non-JSON logs (cms, nginx, db, redis) pass through as raw text
      - match:
          selector: '{service=~"app|mock-esp"}'
          stages:
            - json:
                expressions:
                  level: level
                  event: event
                  request_id: request_id
                  logger: logger
                  duration_seconds: duration_seconds
                  status_code: status_code
                  method: method
                  path: path
            - labels:
                level:
            - timestamp:
                source: timestamp
                format: "2006-01-02T15:04:05.000000Z"
                fallback_formats:
                  - "2006-01-02T15:04:05.000Z"
                  - "2006-01-02T15:04:05Z"

      # Label nginx access logs
      - match:
          selector: '{service="nginx"}'
          stages:
            - regex:
                expression: '^(?P<remote_addr>\S+) .* "(?P<method>\S+) (?P<path>\S+) \S+" (?P<status>\d+)'
            - labels:
                status:
