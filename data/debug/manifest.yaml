# Snapshot regression test manifest.
# Each case is a directory under data/debug/ containing:
#   - structure.json   (DesignFileStructure — node tree)
#   - tokens.json      (ExtractedTokens — colors, typography, spacing)
#   - expected.html    (Visually verified correct converter output)
#   - report.json      (Optional — diagnostic report for reference)
#   - raw_figma.json   (Optional — original Figma API response)
#
# To add a new case:
#   1. Run the diagnostic extract:  python -m app.design_sync.diagnose.extract --connection-id <N>
#   2. Capture current output:      make snapshot-capture CASE=<N>
#   3. Open data/debug/<N>/expected.html in a browser and visually verify
#   4. Add the case to the list below
#   5. Run `make snapshot-test` to confirm it passes
#
# When fixing converter bugs:
#   - All cases below MUST pass before merging
#   - If a fix intentionally changes output, re-verify visually and update expected.html

