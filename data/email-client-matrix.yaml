        max-width: { support: full }
      typography:
        font-family: { support: partial, notes: "Web fonts blocked for privacy" }
      selectors:
        media_queries: { support: partial, notes: "Some media queries stripped" }
    dark_mode:
      type: forced_inversion
      developer_control: none
      selectors: []
      notes: "Aggressive sanitization. External images blocked by default. No dark mode override."
    vml_required: false
    mso_conditionals: false
    known_bugs:
      - id: image_blocking
        symptom: "External images blocked by default, user must opt in"
