  <!-- Connection lines -->
  <line class="st1" x1="14" y1="8.5" x2="18" y2="8.5" stroke="#538fe4" stroke-width="1.5"/>
  <line class="st1" x1="14" y1="23.5" x2="18" y2="23.5" stroke="#538fe4" stroke-width="1.5"/>
  <line class="st1" x1="8.5" y1="14" x2="8.5" y2="18" stroke="#538fe4" stroke-width="1.5"/>
  <line class="st1" x1="23.5" y1="14" x2="23.5" y2="18" stroke="#538fe4" stroke-width="1.5"/>
</svg>
