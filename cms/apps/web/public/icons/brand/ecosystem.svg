<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" version="1.1" viewBox="0 0 32 32">
  <defs>
    <style>
      .st0 {
        fill: #fff;
      }
      .st1 {
        fill: #538fe4;
      }
    </style>
  </defs>
  <!-- Grid/puzzle icon representing ecosystem -->
  <rect class="st0" x="3" y="3" width="11" height="11" rx="2"/>
  <rect class="st0" x="18" y="3" width="11" height="11" rx="2"/>
  <rect class="st0" x="3" y="18" width="11" height="11" rx="2"/>
  <rect class="st0" x="18" y="18" width="11" height="11" rx="2"/>
  <rect class="st1" x="5" y="5" width="7" height="7" rx="1"/>
  <rect class="st1" x="20" y="5" width="7" height="7" rx="1"/>
  <rect class="st1" x="5" y="20" width="7" height="7" rx="1"/>
