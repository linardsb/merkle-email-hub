# Feature Flag Manifest — all flags must be registered here
# CI warns on flags >90 days without removal_date, fails on >180 days
#
# Fields:
#   name:             Environment variable name (e.g., AI__ADAPTIVE_ROUTING_ENABLED)
#   description:      What the flag controls
#   owner:            Team or person responsible
#   created:          Date the flag was added (ISO 8601)
#   removal_date:     Target date to remove the flag (null = permanent)
#   status:           alpha | beta | ga | deprecated
#   permanent_reason: Required when removal_date is null — justifies keeping the flag

