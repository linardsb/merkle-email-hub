services:
  db:
    build:
      context: ./db
      dockerfile: Dockerfile
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-email_hub}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-email_hub}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:?REDIS_PASSWORD is required}"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"${REDIS_PASSWORD:?REDIS_PASSWORD is required}\" ping"]
      interval: 5s
      timeout: 3s
      retries: 3
    restart: unless-stopped

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["alembic", "upgrade", "head"]
    environment:
      - DATABASE__URL=postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@db:5432/${POSTGRES_DB:-email_hub}
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  seed:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["python", "-m", "app.seed_demo"]
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - DATABASE__URL=postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@db:5432/${POSTGRES_DB:-email_hub}
      - REDIS__URL=redis://:${REDIS_PASSWORD:?REDIS_PASSWORD is required}@redis:6379/0
      - AUTH__JWT_SECRET_KEY=${AUTH__JWT_SECRET_KEY}
      - AUTH__DEMO_USER_PASSWORD=${AUTH__DEMO_USER_PASSWORD:?AUTH__DEMO_USER_PASSWORD is required}
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    restart: "no"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    # Uses Dockerfile CMD: gunicorn with 4 UvicornWorkers
    expose:
      - "8891"
    volumes:
      - document_data:/app/data/documents
    environment:
      - PYTHONUNBUFFERED=1
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - DATABASE__URL=postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@db:5432/${POSTGRES_DB:-email_hub}
      - REDIS__URL=redis://:${REDIS_PASSWORD:?REDIS_PASSWORD is required}@redis:6379/0
      - MAIZZLE_BUILDER_URL=http://maizzle-builder:3001
      - AUTH__JWT_SECRET_KEY=${AUTH__JWT_SECRET_KEY}
      - AUTH__DEMO_USER_PASSWORD=${AUTH__DEMO_USER_PASSWORD:?AUTH__DEMO_USER_PASSWORD is required}
      - AI__PROVIDER=${AI__PROVIDER:-anthropic}
      - AI__API_KEY=${AI__API_KEY}
      - AI__MODEL=${AI__MODEL:-claude-sonnet-4-20250514}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-["http://localhost:3100"]}
      - ESP_SYNC__BRAZE_BASE_URL=http://mock-esp:3002/braze
      - ESP_SYNC__SFMC_BASE_URL=http://mock-esp:3002/sfmc
      - ESP_SYNC__ADOBE_BASE_URL=http://mock-esp:3002/adobe
      - ESP_SYNC__TAXI_BASE_URL=http://mock-esp:3002/taxi
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      seed:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8891/health')"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 120s
    restart: unless-stopped

  cms:
    build:
      context: ./cms
      dockerfile: apps/web/Dockerfile
      args:
        - NEXT_PUBLIC_COLLAB_WS_URL=${NEXT_PUBLIC_COLLAB_WS_URL:-wss://localhost}
    expose:
      - "3100"
    environment:
      - PORT=3100
      - INTERNAL_API_URL=http://app:8891
      - BACKEND_URL=http://app:8891
      - AUTH_SECRET=${AUTH_SECRET}
      - AUTH_TRUST_HOST=true
      - AUTH_URL=${AUTH_URL:?AUTH_URL must be set to your production domain (e.g. https://yourdomain.com)}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3100 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped

  maizzle-builder:
    build:
      context: ./services/maizzle-builder
      dockerfile: Dockerfile
    expose:
      - "3001"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    volumes:
      - email_templates:/app/email-templates
    restart: unless-stopped

  mock-esp:
    build:
      context: ./services/mock-esp
      dockerfile: Dockerfile
    expose:
      - "3002"
    volumes:
      - mock_esp_data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:3002/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    expose:
      - "80"
    networks:
      - default
      - coolify
    labels:
      - "traefik.http.services.nginx.loadbalancer.server.port=80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:80/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    depends_on:
      app:
        condition: service_healthy
      cms:
        condition: service_healthy
    restart: unless-stopped

networks:
  coolify:
    external: true

volumes:
  postgres_data:
    name: i7kcm8soim4ubtsf6ioon1r0_postgres_data
    external: true
  redis_data:
    driver: local
  document_data:
    driver: local
  mock_esp_data:
    driver: local
  email_templates:
    driver: local
