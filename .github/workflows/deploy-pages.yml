name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths: [index.html]

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Push to linardsb.github.io
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.PAGES_TOKEN }}
          external_repository: linardsb/linardsb.github.io
          publish_branch: main
          publish_dir: .
          keep_files: false
          include_files: index.html
