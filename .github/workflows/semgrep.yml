name: Semgrep Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 3" # Weekly Wednesday 6am UTC

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4

      # Advisory mode: findings surface in logs + SARIF artifact, but don't block CI.
      # Flip `continue-on-error` to false after the 43 open findings are triaged.
      - name: Run Semgrep
        continue-on-error: true
        run: semgrep ci --sarif --output=semgrep.sarif --exclude='docs/eval-labeling-tool.html'
        env:
          SEMGREP_RULES: >-
            p/python
            p/javascript
            p/typescript
            p/nextjs
            p/react
            p/owasp-top-ten
            p/security-audit
            p/secrets
            p/default
            ./.semgrep/rules

      # Tolerates the repo having GHAS code-scanning disabled.
      # Upload still succeeds once code-scanning is enabled in repo settings.
      - name: Upload SARIF to GitHub
        uses: github/codeql-action/upload-sarif@v4
        continue-on-error: true
        if: always()
        with:
          sarif_file: semgrep.sarif

      - name: Upload SARIF artifact (fallback when code-scanning is disabled)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: semgrep-sarif
          path: semgrep.sarif
          retention-days: 14
