version: 2
updates:
  # Backend (uv / pyproject.toml at root)
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10

  # Mock ESP sidecar (pip / requirements.txt)
  - package-ecosystem: "pip"
    directory: "/services/mock-esp"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

  # Frontend monorepo (npm/pnpm at cms/)
  - package-ecosystem: "npm"
    directory: "/cms"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10

  # GitHub Actions workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
