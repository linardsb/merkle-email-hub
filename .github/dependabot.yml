version: 2
updates:
  # Backend (uv / pyproject.toml at root)
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    ignore:
      # Pinned by cognee[graph] extra (cognee depends on gunicorn<24).
      # Resolver fails any major-version bump until cognee relaxes its constraint.
      - dependency-name: "gunicorn"
        update-types: ["version-update:semver-major"]
      # Pinned by cognee → fastapi-users (==0.0.20). Skip patch/minor bumps
      # so Dependabot stops attempting unsatisfiable upgrades.
      - dependency-name: "python-multipart"

  # Mock ESP sidecar (pip / requirements.txt)
  - package-ecosystem: "pip"
    directory: "/services/mock-esp"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

  # Frontend monorepo (npm/pnpm at cms/)
  - package-ecosystem: "npm"
    directory: "/cms"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    ignore:
      # @vitejs/plugin-react 6.x requires Vite ^8.0.0 (it imports
      # vite/internal which only exists in Vite 8). We're on Vite 7.
      # Remove this entry as part of the planned Vite 7 → 8 migration —
      # bump Vite + plugin-react together in one coordinated PR.
      - dependency-name: "@vitejs/plugin-react"
        update-types: ["version-update:semver-major"]

  # GitHub Actions workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
